---
# verify.yml — acceptance tests for live infrastructure
# Run after make play: ansible-playbook -i inventory/hosts.yml verify.yml
#
# Sections mirror the verification checklist in .windsurf/plans/homelab-ansible-plan.md.
# Destructive / stateful failover tests (stopping pihole-FTL, etc.) are omitted —
# run those manually per the checklist.

##############################################################################
# DNS
##############################################################################

# PLAY 1: Enterprise (Proxmox host) routes DNS through Pi-hole
#
# Enterprise has a static IP, so it never gets DNS config from DHCP — its only
# DNS configuration is the /etc/resolv.conf file that Ansible templates. We read
# that file and assert that all three expected nameservers are listed: Pi-hole
# primary (centaurus), Pi-hole secondary (andromeda), and 1.1.1.1 as a last-resort
# fallback in case both Pi-holes are unreachable. The list is derived from
# proxmox_dns_servers in group_vars rather than hardcoded, so it stays correct
# if the Pi-hole node IPs ever change.
#
# Note: we slurp the file rather than running `resolvectl status` because Proxmox
# does not run systemd-resolved — it manages resolv.conf directly.
- name: DNS | Enterprise uses Pi-hole for resolution
  hosts: proxmox_nodes
  gather_facts: false
  tasks:
    - name: Read /etc/resolv.conf
      ansible.builtin.slurp:
        src: /etc/resolv.conf
      register: resolv_conf
      tags: [verify, dns]

    - name: Assert all configured DNS servers are present
      ansible.builtin.assert:
        that: item in (resolv_conf.content | b64decode)
        fail_msg: "DNS server {{ item }} missing from /etc/resolv.conf"
        success_msg: "DNS server {{ item }} present in /etc/resolv.conf"
      loop: "{{ proxmox_dns_servers }}"
      tags: [verify, dns]

# PLAY 2: Pi-hole nodes bypass Pi-hole for their own DNS
#
# If centaurus or andromeda used Pi-hole for their own OS-level DNS, you'd have a
# circular dependency: Pi-hole needs to be running for the host to resolve names,
# but the host needs to resolve names to start services. To break the circle, both
# Pi-hole nodes are configured to use public DNS (1.1.1.1 / 1.0.0.1) directly.
#
# This is done via a systemd-resolved drop-in file that sets:
#   DNS=1.1.1.1 1.0.0.1   — use Cloudflare as the resolver
#   Domains=~.             — route ALL queries through this config, not just
#                            fallback. Without ~., systemd-resolved would still
#                            prefer the DHCP-assigned DNS (Pi-hole IPs that Unifi
#                            hands out to every host on the network) for general
#                            queries, making the drop-in mostly ineffective.
#
# We assert the drop-in file content rather than running `resolvectl status`
# because resolvectl shows ALL DNS servers including the DHCP-advertised ones —
# Pi-hole IPs will always appear there since Unifi advertises them to every host.
# Checking the file is the correct way to verify what we actually configured.
# Functional verification (DNS still works when Pi-hole is down) requires the
# manual failover test in the checklist — that's intentionally not automated
# here because it requires stopping and restarting a live service.
- name: DNS | Pi-hole nodes use public DNS (no circular dependency)
  hosts: pihole_nodes
  gather_facts: false
  tasks:
    - name: Read systemd-resolved drop-in
      ansible.builtin.slurp:
        src: /etc/systemd/resolved.conf.d/ansible-dns.conf
      register: resolved_dropin
      tags: [verify, dns]

    - name: Assert public DNS servers and catch-all routing are configured in drop-in
      ansible.builtin.assert:
        that: item in (resolved_dropin.content | b64decode)
        fail_msg: "'{{ item }}' missing from resolved drop-in on {{ inventory_hostname }}"
        success_msg: "'{{ item }}' present in resolved drop-in on {{ inventory_hostname }}"
      loop: "{{ [pihole_dns_1, pihole_dns_2, '~.'] }}"
      tags: [verify, dns]

# PLAY 3: Pi-hole actually resolves internal hostnames correctly
#
# This is a functional test — it runs from your local machine and fires real DNS
# queries directly at the Pi-hole primary (centaurus) using `dig @<pihole-ip>`.
# It verifies that Pi-hole has the correct A records for all internal hosts and
# can answer queries for them. This would catch a misconfigured local DNS entry
# or a Pi-hole that's up but not serving the right answers.
#
# The expected IPs come from inventory host_vars, so they stay in sync with the
# rest of the config automatically.
- name: DNS | Pi-hole resolves internal hostnames correctly
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    pihole_primary_ip: "{{ hostvars['centaurus']['ip_address'] }}"
    expected_resolutions:
      - hostname: "enterprise.{{ domain }}"
        ip: "{{ hostvars['enterprise']['ip_address'] }}"
      - hostname: "centaurus.{{ domain }}"
        ip: "{{ hostvars['centaurus']['ip_address'] }}"
      - hostname: "norville.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
  tasks:
    - name: Query Pi-hole for internal hostname
      ansible.builtin.command: "dig +short {{ item.hostname }} @{{ pihole_primary_ip }}"
      register: dig_results
      changed_when: false
      loop: "{{ expected_resolutions }}"
      loop_control:
        label: "{{ item.hostname }}"
      tags: [verify, dns]

    - name: Assert internal hostnames resolve to expected IPs
      ansible.builtin.assert:
        that: "item.item.ip in item.stdout"
        fail_msg: "{{ item.item.hostname }} did not resolve to {{ item.item.ip }} via Pi-hole (got: '{{ item.stdout | default('(empty)') }}')"
        success_msg: "{{ item.item.hostname }} → {{ item.item.ip }}"
      loop: "{{ dig_results.results }}"
      loop_control:
        label: "{{ item.item.hostname }}"
      tags: [verify, dns]

##############################################################################
# TLS
##############################################################################

# PLAY 4: Proxmox has a valid Let's Encrypt cert
#
# Proxmox manages its own TLS via its ACME integration (configured in bootstrap).
# The cert is for enterprise.510forward.space, issued by Let's Encrypt via
# Cloudflare DNS-01 challenge, and Proxmox handles renewal automatically.
#
# Two checks:
# - uri with validate_certs: true confirms the cert is trusted and not expired.
#   If this passes, the CA chain is valid — no self-signed cert slipping through.
# - openssl checks the issuer is actually Let's Encrypt (not some other CA) and
#   the subject matches the expected hostname. We pipe /dev/null into s_client so
#   it doesn't hang waiting for stdin.
- name: TLS | Proxmox has a valid Let's Encrypt cert
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    proxmox_url: "https://enterprise.{{ domain }}:8006"
    proxmox_host: "enterprise.{{ domain }}"
  tasks:
    - name: Connect to Proxmox over HTTPS (validates cert trust chain)
      ansible.builtin.uri:
        url: "{{ proxmox_url }}"
        validate_certs: true
        status_code: [200, 301, 302]
      tags: [verify, tls]

    - name: Get Proxmox cert issuer and subject via openssl
      ansible.builtin.shell: >
        openssl s_client -connect {{ proxmox_host }}:8006
        -servername {{ proxmox_host }} </dev/null 2>/dev/null
        | openssl x509 -noout -issuer -subject
      register: proxmox_cert_info
      changed_when: false
      tags: [verify, tls]

    - name: Assert Proxmox cert is issued by Let's Encrypt
      ansible.builtin.assert:
        that: "'Let' in proxmox_cert_info.stdout"
        fail_msg: "Proxmox cert issuer is not Let's Encrypt: {{ proxmox_cert_info.stdout }}"
        success_msg: "Proxmox cert issuer OK: {{ proxmox_cert_info.stdout }}"
      tags: [verify, tls]

    - name: Assert Proxmox cert subject matches expected hostname
      ansible.builtin.assert:
        that: proxmox_host in proxmox_cert_info.stdout
        fail_msg: "Proxmox cert subject does not include {{ proxmox_host }}: {{ proxmox_cert_info.stdout }}"
        success_msg: "Proxmox cert subject OK: {{ proxmox_cert_info.stdout }}"
      tags: [verify, tls]

# PLAY 5: NPM is serving the wildcard cert
#
# NPM on norville holds a *.510forward.space wildcard cert issued via Cloudflare
# DNS-01 challenge. It serves this cert for all proxy hosts on port 443.
#
# We only test norville.510forward.space here because that's the only hostname
# that currently resolves to norville's IP (192.168.30.58) via Pi-hole DNS.
# centaurus.510forward.space and enterprise.510forward.space still resolve to
# their actual host IPs — routing those through NPM on port 443 requires a DNS
# change that's tracked as future work in the plan.
#
# Same two-step pattern as the Proxmox check: uri for trust chain, openssl for
# issuer and subject details.
- name: TLS | NPM is serving the wildcard cert
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    npm_host: "norville.{{ domain }}"
  tasks:
    - name: Connect to NPM over HTTPS (validates cert trust chain)
      ansible.builtin.uri:
        url: "https://{{ npm_host }}"
        validate_certs: true
        status_code: [200, 301, 302]
      tags: [verify, tls]

    - name: Get NPM cert issuer and subject via openssl
      ansible.builtin.shell: >
        openssl s_client -connect {{ npm_host }}:443
        -servername {{ npm_host }} </dev/null 2>/dev/null
        | openssl x509 -noout -issuer -subject
      register: npm_cert_info
      changed_when: false
      tags: [verify, tls]

    - name: Assert NPM cert is issued by Let's Encrypt
      ansible.builtin.assert:
        that: "'Let' in npm_cert_info.stdout"
        fail_msg: "NPM cert issuer is not Let's Encrypt: {{ npm_cert_info.stdout }}"
        success_msg: "NPM cert issuer OK: {{ npm_cert_info.stdout }}"
      tags: [verify, tls]

    - name: Assert NPM cert is the wildcard
      ansible.builtin.assert:
        that: ('*.' + domain) in npm_cert_info.stdout
        fail_msg: "NPM cert subject is not the wildcard: {{ npm_cert_info.stdout }}"
        success_msg: "NPM cert subject OK: {{ npm_cert_info.stdout }}"
      tags: [verify, tls]

# PLAY 6: HTTP redirects to HTTPS
#
# NPM should redirect plaintext HTTP requests to HTTPS so nothing leaks over
# port 80. We test this on norville.510forward.space (the only hostname currently
# routing through NPM — see Play 5 comment). follow_redirects: none means the
# uri module returns the redirect response itself rather than following it, so
# we can assert on the status code and Location header.
- name: TLS | HTTP redirects to HTTPS
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    npm_host: "norville.{{ domain }}"
  tasks:
    - name: Request norville over HTTP
      ansible.builtin.uri:
        url: "http://{{ npm_host }}"
        follow_redirects: none
        status_code: [301, 302]
      register: http_response
      tags: [verify, tls]

    - name: Assert redirect destination is HTTPS
      ansible.builtin.assert:
        that: "http_response.location is defined and http_response.location.startswith('https://')"
        fail_msg: "HTTP did not redirect to HTTPS (Location: {{ http_response.location | default('none') }})"
        success_msg: "HTTP → HTTPS redirect OK (Location: {{ http_response.location }})"
      tags: [verify, tls]
