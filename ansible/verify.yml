---
# verify.yml — acceptance tests for live infrastructure
# Run after make play: ansible-playbook -i inventory/hosts.yml verify.yml
#
# Sections mirror the verification checklist in .windsurf/plans/homelab-ansible-plan.md.
# Destructive / stateful failover tests (stopping pihole-FTL, etc.) are omitted —
# run those manually per the checklist.

##############################################################################
# DNS
##############################################################################

# PLAY 1: Enterprise can resolve internal hostnames via Pi-hole
#
# Runs dig on enterprise itself, which exercises the full stack: the resolv.conf
# must point at Pi-hole, Pi-hole must be up, and Pi-hole must have the correct
# A records. If any of those break, this fails.
#
# UNTESTED: whether Pi-hole nodes (centaurus, andromeda) bypass Pi-hole for their
# own OS-level DNS. They're configured to use 1.1.1.1 directly via a
# systemd-resolved drop-in (Domains=~.) to avoid a circular dependency at boot,
# but verifying that behaviorally requires stopping pihole-FTL and confirming DNS
# still works — a destructive test. Run the manual failover test in the checklist
# to verify this.
- name: DNS | Enterprise resolves internal hostnames via Pi-hole
  hosts: proxmox_nodes
  gather_facts: false
  vars:
    expected_resolutions:
      - hostname: "centaurus.{{ domain }}"
        ip: "{{ hostvars['centaurus']['ip_address'] }}"
      - hostname: "norville.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
      - hostname: "dorothy.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
  tasks:
    - name: Resolve internal hostname from enterprise
      ansible.builtin.command: "dig +short {{ item.hostname }}"
      register: dig_results
      changed_when: false
      loop: "{{ expected_resolutions }}"
      loop_control:
        label: "{{ item.hostname }}"
      tags: [verify, dns]

    - name: Assert internal hostnames resolve to expected IPs
      ansible.builtin.assert:
        that: item.item.ip in item.stdout
        fail_msg: "{{ item.item.hostname }} did not resolve to {{ item.item.ip }} from enterprise (got: '{{ item.stdout | default('(empty)') }}')"
        success_msg: "{{ item.item.hostname }} → {{ item.item.ip }}"
      loop: "{{ dig_results.results }}"
      loop_control:
        label: "{{ item.item.hostname }}"
      tags: [verify, dns]

# PLAY 3: Pi-hole actually resolves internal hostnames correctly
#
# This is a functional test — it runs from your local machine and fires real DNS
# queries directly at the Pi-hole primary (centaurus) using `dig @<pihole-ip>`.
# It verifies that Pi-hole has the correct A records for all internal hosts and
# can answer queries for them. This would catch a misconfigured local DNS entry
# or a Pi-hole that's up but not serving the right answers.
#
# The expected IPs come from inventory host_vars, so they stay in sync with the
# rest of the config automatically.
- name: DNS | Pi-hole resolves internal hostnames correctly
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    pihole_primary_ip: "{{ hostvars['centaurus']['ip_address'] }}"
    expected_resolutions:
      - hostname: "enterprise.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
      - hostname: "centaurus.{{ domain }}"
        ip: "{{ hostvars['centaurus']['ip_address'] }}"
      - hostname: "norville.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
      - hostname: "dorothy.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
  tasks:
    - name: Query Pi-hole for internal hostname
      ansible.builtin.command: "dig +short {{ item.hostname }} @{{ pihole_primary_ip }}"
      register: dig_results
      changed_when: false
      loop: "{{ expected_resolutions }}"
      loop_control:
        label: "{{ item.hostname }}"
      tags: [verify, dns]

    - name: Assert internal hostnames resolve to expected IPs
      ansible.builtin.assert:
        that: "item.item.ip in item.stdout"
        fail_msg: "{{ item.item.hostname }} did not resolve to {{ item.item.ip }} via Pi-hole (got: '{{ item.stdout | default('(empty)') }}')"
        success_msg: "{{ item.item.hostname }} → {{ item.item.ip }}"
      loop: "{{ dig_results.results }}"
      loop_control:
        label: "{{ item.item.hostname }}"
      tags: [verify, dns]

##############################################################################
# QEMU GUEST AGENT
##############################################################################

# PLAY: QEMU guest agent is running on all VMs
#
# Verifies the agent service is active inside each VM. If it's not running,
# Proxmox can't use it for clean shutdown, snapshots, or IP display.
# The agent requires the virtio-serial channel to be enabled in Proxmox
# (set via pvesh after VM creation) — if it's not running, check that first.
- name: QEMU | Guest agent is running on all VMs
  hosts: qemu_vms
  gather_facts: false
  tasks:
    - name: Check qemu-guest-agent is active
      ansible.builtin.command: systemctl is-active qemu-guest-agent
      register: _agent_status
      changed_when: false
      tags: [verify, qemu]

    - name: Assert qemu-guest-agent is running
      ansible.builtin.assert:
        that: _agent_status.stdout == "active"
        fail_msg: "qemu-guest-agent is not running on {{ inventory_hostname }} (status: {{ _agent_status.stdout }})"
        success_msg: "qemu-guest-agent is active on {{ inventory_hostname }}"
      tags: [verify, qemu]

##############################################################################
# NPM PROXY
##############################################################################

# PLAY 4: NPM can reach its backends
#
# Runs curl from norville directly to each backend IP, bypassing DNS and NPM
# entirely. This isolates the NPM → backend leg: if NPM returns a 502, it's
# because the backend is unreachable or rejecting the connection, and this test
# will catch that independently of any DNS or proxy config.
#
# The Proxmox backend uses HTTPS with a valid Let's Encrypt cert, so we use
# validate_certs: false since we're connecting by IP — there are no IP SANs
# in the cert. We're testing reachability here, not TLS (that's Play 4/5 in TLS).
- name: NPM | Homepage backend is reachable from norville
  hosts: norville
  gather_facts: false
  tasks:
    - name: Reach Homepage backend from norville
      ansible.builtin.uri:
        url: "http://{{ hostvars['dorothy']['ip_address'] }}:3000"
        status_code: 200
      tags: [verify, npm]

- name: NPM | Home Assistant backend is reachable from norville
  hosts: norville
  gather_facts: false
  tasks:
    - name: Reach Home Assistant backend from norville
      ansible.builtin.uri:
        url: "http://{{ hostvars['codsworth']['ip_address'] }}:8123/api/"
        status_code: 200
      tags: [verify, npm, home_assistant]

- name: NPM | Proxmox backend is reachable from norville
  hosts: norville
  gather_facts: false
  tasks:
    - name: Reach Proxmox backend from norville
      ansible.builtin.uri:
        url: "https://{{ hostvars['enterprise']['ip_address'] }}:8006"
        validate_certs: false
        status_code: [200, 301, 302]
      tags: [verify, npm]

# PLAY 5: NPM proxies active subdomains end-to-end
#
# Tests the full chain: DNS resolves to norville, NPM receives the request on
# port 443, backend responds.
#
# UNTESTED via NPM: Pi-hole UIs (centaurus, andromeda). Pi-hole is the DNS
# server itself and refuses to return norville's IP for its own hostname — it
# always returns its own real IP as a safety measure. So centaurus.510forward.space
# always resolves to 192.168.30.77, and nothing listens on port 443 there. Access
# Pi-hole UIs directly at http://192.168.30.77 and http://192.168.30.55 instead.
- name: NPM | active subdomains are reachable end-to-end
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    npm_proxied_hosts:
      - subdomain: norville
        expected_status: 200
      - subdomain: enterprise
        expected_status: [200, 301, 302]
      - subdomain: dorothy
        expected_status: 200
      - subdomain: codsworth
        expected_status: 200
  tasks:
    - name: Reach proxied subdomain via NPM
      ansible.builtin.uri:
        url: "https://{{ item.subdomain }}.{{ domain }}"
        status_code: "{{ item.expected_status }}"
      loop: "{{ npm_proxied_hosts }}"
      loop_control:
        label: "{{ item.subdomain }}.{{ domain }}"
      tags: [verify, npm]

##############################################################################
# TLS
##############################################################################

# PLAY 4: Proxmox has a valid Let's Encrypt cert
#
# Proxmox manages its own TLS via its ACME integration (configured in bootstrap).
# The cert is for enterprise.510forward.space, issued by Let's Encrypt via
# Cloudflare DNS-01 challenge, and Proxmox handles renewal automatically.
#
# enterprise.510forward.space now resolves to norville (NPM), so we connect
# directly to the Proxmox IP:8006 with -servername to check the cert Proxmox
# is serving on the backend. We pipe /dev/null into s_client so it doesn't hang.
- name: TLS | Proxmox has a valid Let's Encrypt cert
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    proxmox_ip: "{{ hostvars['enterprise']['ip_address'] }}"
    proxmox_host: "enterprise.{{ domain }}"
  tasks:
    - name: Get Proxmox cert issuer and subject via openssl
      ansible.builtin.shell: >
        openssl s_client -connect {{ proxmox_ip }}:8006
        -servername {{ proxmox_host }} </dev/null 2>/dev/null
        | openssl x509 -noout -issuer -subject
      register: proxmox_cert_info
      changed_when: false
      tags: [verify, tls]

    - name: Assert Proxmox cert is issued by Let's Encrypt
      ansible.builtin.assert:
        that: "'Let' in proxmox_cert_info.stdout"
        fail_msg: "Proxmox cert issuer is not Let's Encrypt: {{ proxmox_cert_info.stdout }}"
        success_msg: "Proxmox cert issuer OK: {{ proxmox_cert_info.stdout }}"
      tags: [verify, tls]

    - name: Assert Proxmox cert subject matches expected hostname
      ansible.builtin.assert:
        that: proxmox_host in proxmox_cert_info.stdout
        fail_msg: "Proxmox cert subject does not include {{ proxmox_host }}: {{ proxmox_cert_info.stdout }}"
        success_msg: "Proxmox cert subject OK: {{ proxmox_cert_info.stdout }}"
      tags: [verify, tls]

# PLAY 5: NPM is serving the wildcard cert
#
# NPM on norville holds a *.510forward.space wildcard cert issued via Cloudflare
# DNS-01 challenge. It serves this cert for all proxy hosts on port 443.
#
# Tests norville.510forward.space — enterprise.510forward.space also routes
# through NPM but its backend cert is tested above. Pi-hole UIs aren't reachable
# via NPM due to FTL self-protection.
#
# Same pattern as the Proxmox check: uri for trust chain, openssl for issuer
# and subject details.
- name: TLS | NPM is serving the wildcard cert
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    npm_host: "norville.{{ domain }}"
  tasks:
    - name: Connect to NPM over HTTPS (validates cert trust chain)
      ansible.builtin.uri:
        url: "https://{{ npm_host }}"
        status_code: [200, 301, 302]
      tags: [verify, tls]

    - name: Get NPM cert issuer and subject via openssl
      ansible.builtin.shell: >
        openssl s_client -connect {{ npm_host }}:443
        -servername {{ npm_host }} </dev/null 2>/dev/null
        | openssl x509 -noout -issuer -subject
      register: npm_cert_info
      changed_when: false
      tags: [verify, tls]

    - name: Assert NPM cert is issued by Let's Encrypt
      ansible.builtin.assert:
        that: "'Let' in npm_cert_info.stdout"
        fail_msg: "NPM cert issuer is not Let's Encrypt: {{ npm_cert_info.stdout }}"
        success_msg: "NPM cert issuer OK: {{ npm_cert_info.stdout }}"
      tags: [verify, tls]

    - name: Assert NPM cert is the wildcard
      ansible.builtin.assert:
        that: ('*.' + domain) in npm_cert_info.stdout
        fail_msg: "NPM cert subject is not the wildcard: {{ npm_cert_info.stdout }}"
        success_msg: "NPM cert subject OK: {{ npm_cert_info.stdout }}"
      tags: [verify, tls]

# PLAY 6: HTTP redirects to HTTPS
#
# NPM should redirect plaintext HTTP requests to HTTPS so nothing leaks over
# port 80. We test this on norville.510forward.space (the only hostname currently
# routing through NPM — see Play 5 comment). follow_redirects: none means the
# uri module returns the redirect response itself rather than following it, so
# we can assert on the status code and Location header.
- name: TLS | HTTP redirects to HTTPS
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    npm_host: "norville.{{ domain }}"
  tasks:
    - name: Request norville over HTTP
      ansible.builtin.uri:
        url: "http://{{ npm_host }}"
        follow_redirects: none
        status_code: [301, 302]
      register: http_response
      tags: [verify, tls]

    - name: Assert redirect destination is HTTPS
      ansible.builtin.assert:
        that: "http_response.location is defined and http_response.location.startswith('https://')"
        fail_msg: "HTTP did not redirect to HTTPS (Location: {{ http_response.location | default('none') }})"
        success_msg: "HTTP → HTTPS redirect OK (Location: {{ http_response.location }})"
      tags: [verify, tls]

##############################################################################
# HOME ASSISTANT
##############################################################################

# PLAY: Home Assistant API is responding
#
# Verifies HA is up and serving its REST API. The /api/ endpoint returns 200
# with no authentication required, making it a reliable liveness check.
# Runs from localhost through NPM (codsworth.510forward.space) so it exercises
# DNS → NPM → HA backend in a single check.
- name: HA | Home Assistant API is responding
  hosts: localhost
  gather_facts: false
  connection: local
  tasks:
    - name: Reach Home Assistant API via NPM
      ansible.builtin.uri:
        url: "https://codsworth.{{ domain }}/api/"
        status_code: 200
      tags: [verify, home_assistant]
