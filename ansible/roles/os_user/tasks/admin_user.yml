---
# Creates an OS admin user with Bootstrap console password, nopassword sudo, and SSH key.
# Password is generated once and stored in 1Password — only used for KVM console emergency access.
# update_password: on_create — password_hash generates a new salt each run but is only applied
# at user creation. The hash is never compared on subsequent runs, so no salt needs to be stored.

- name: Ensure admin user credentials exist in 1Password
  no_log: true
  ansible.builtin.include_role:
    name: onepassword
  vars:
    onepassword_action: upsert
    onepassword_item:
      title: "{{ os_user_admin_password_item_title }}"
      category: LOGIN
      tags: [ansible-bootstrap]
      fields:
        - { id: username, type: STRING, purpose: USERNAME, label: username, value: "{{ os_user_admin_name }}" }
        - { id: password, type: CONCEALED, purpose: PASSWORD, label: password }

- name: Create OS admin user
  become: true
  no_log: true
  ansible.builtin.user:
    name: "{{ os_user_admin_name }}"
    shell: /bin/bash
    password: >-
      {{
        onepassword_item_result.fields |
        selectattr('id', 'equalto', 'password') |
        map(attribute='value') | first
        | password_hash('sha512')
      }}
    update_password: on_create

- name: Grant admin user sudo
  become: true
  community.general.sudoers:
    name: "{{ os_user_admin_name }}"
    commands: ALL
    runas: ALL
    state: present
    user: "{{ os_user_admin_name }}"
    nopassword: true

- name: Authorize sysadmin SSH key for admin user
  ansible.builtin.include_role:
    name: identity
    tasks_from: static_key
  vars:
    identity_static_key_user: "{{ os_user_admin_name }}"
    identity_static_key_public_key: "{{ sysadmin_public_key }}"
