---
- name: Read Pi-hole admin password
  no_log: true
  ansible.builtin.include_role:
    name: onepassword
  vars:
    onepassword_action: read
    onepassword_item:
      title: "Pi-hole Admin Password"
  tags: homepage

- name: Set Pi-hole password fact
  ansible.builtin.set_fact:
    _homepage_pihole_password: >-
      {{
        onepassword_item_result.fields |
        selectattr('id', 'equalto', 'password') |
        map(attribute='value') | first
      }}
  no_log: true
  tags: homepage

- name: Read NPM admin credentials
  no_log: true
  ansible.builtin.include_role:
    name: onepassword
  vars:
    onepassword_action: read
    onepassword_item:
      title: "NGINX Proxy Manager Admin Password"
  tags: homepage

- name: Set NPM credentials facts
  ansible.builtin.set_fact:
    _homepage_npm_email: >-
      {{
        onepassword_item_result.fields |
        selectattr('id', 'equalto', 'username') |
        map(attribute='value') | first
      }}
    _homepage_npm_password: >-
      {{
        onepassword_item_result.fields |
        selectattr('id', 'equalto', 'password') |
        map(attribute='value') | first
      }}
  no_log: true
  tags: homepage

- name: Read Homepage Proxmox token
  no_log: true
  ansible.builtin.include_role:
    name: onepassword
  vars:
    onepassword_action: read
    onepassword_item:
      title: "Proxmox Homepage API Token"
  tags: homepage

- name: Set Proxmox token facts
  ansible.builtin.set_fact:
    _homepage_proxmox_token_id: >-
      {{
        onepassword_item_result.fields |
        selectattr('id', 'equalto', 'username') |
        map(attribute='value') | first
      }}
    _homepage_proxmox_token_secret: >-
      {{
        onepassword_item_result.fields |
        selectattr('id', 'equalto', 'password') |
        map(attribute='value') | first
      }}
  no_log: true
  tags: homepage

- name: Ensure config directory exists
  become: true
  ansible.builtin.file:
    path: /opt/homepage/config
    state: directory
    owner: homepage
    group: homepage
    mode: "0750"
  tags: homepage

- name: Template services.yaml
  become: true
  ansible.builtin.template:
    src: services.yaml.j2
    dest: /opt/homepage/config/services.yaml
    owner: homepage
    group: homepage
    mode: "0640"
  notify: Restart homepage
  tags: homepage

- name: Template proxmox.yaml
  become: true
  ansible.builtin.template:
    src: proxmox.yaml.j2
    dest: /opt/homepage/config/proxmox.yaml
    owner: homepage
    group: homepage
    mode: "0640"
  notify: Restart homepage
  tags: homepage

- name: Copy static config files
  become: true
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/opt/homepage/config/{{ item }}"
    owner: homepage
    group: homepage
    mode: "0640"
  loop:
    - settings.yaml
    - widgets.yaml
    - bookmarks.yaml
  notify: Restart homepage
  tags: homepage

- name: Copy background image and favicon
  become: true
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/opt/homepage/public/{{ item }}"
    owner: homepage
    group: homepage
    mode: "0644"
  loop:
    - tenforward.jpg
    - favicon.png
  tags: homepage
