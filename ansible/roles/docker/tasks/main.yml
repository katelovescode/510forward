---
- name: Install Docker dependencies
  become: true
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - python3-debian
    state: present
    update_cache: true

- name: Add Docker apt repository
  become: true
  ansible.builtin.deb822_repository:
    name: docker
    types: deb
    uris: "https://download.docker.com/linux/{{ ansible_distribution | lower }}"
    suites: "{{ ansible_distribution_release }}"
    components: stable
    architectures: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
    signed_by: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    state: present
  register: docker_repo

- name: Install Docker packages
  become: true
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: "{{ docker_repo.changed }}"

- name: Ensure Docker service is enabled and started
  become: true
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add ansible user to docker group
  become: true
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
  register: docker_group_result

- name: Reset SSH connection to pick up docker group membership
  ansible.builtin.meta: reset_connection
  when: docker_group_result.changed # noqa: no-handler
