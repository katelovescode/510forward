---
argument_specs:
  known_hosts:
    short_description: Update known_hosts for a target host
    options:
      identity_target:
        type: str
        required: false
        description: >
          Inventory hostname to scan instead of the current host.
          When omitted, uses inventory_hostname.

  upsert_key:
    short_description: Create or manage an SSH key in 1Password and authorize it for a user
    options:
      identity_upsert_key_user:
        type: str
        required: true
        description: System username to create the SSH key for and authorize on the remote host.
      identity_upsert_key_item_title:
        type: str
        required: true
        description: 1Password item title for the SSH key.

  static_key:
    short_description: Authorize a pre-existing SSH public key for a user
    options:
      identity_static_key_user:
        type: str
        required: true
        description: System username to authorize the key for.
      identity_static_key_public_key:
        type: str
        required: true
        description: SSH public key string to authorize.
