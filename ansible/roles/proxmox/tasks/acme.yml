---
- name: Read Cloudflare API token from 1Password
  no_log: true
  ansible.builtin.include_role:
    name: onepassword
  vars:
    onepassword_action: read
    onepassword_item:
      title: "Cloudflare DNS API Token"

- name: Set Cloudflare token fact
  no_log: true
  ansible.builtin.set_fact:
    proxmox_acme_cloudflare_token: >-
      {{
        onepassword_item_result.fields |
        selectattr('id', 'equalto', 'credential') |
        map(attribute='value') | first
      }}

- name: Check ACME account
  become: true
  ansible.builtin.command:
    cmd: pvesh get /cluster/acme/account/{{ proxmox_acme_account }} --output-format json
  register: proxmox_acme_account_check
  failed_when: false
  changed_when: false
  tags: proxmox

- name: Create ACME account
  become: true
  ansible.builtin.command:
    cmd: >-
      pvesh create /cluster/acme/account
      -name {{ proxmox_acme_account }}
      -contact "{{ admin_email }}"
      -tos_url {{ proxmox_acme_tos_url }}
  when: proxmox_acme_account_check.rc != 0
  changed_when: true
  tags: proxmox

- name: Check Cloudflare DNS plugin
  become: true
  ansible.builtin.command:
    cmd: pvesh get /cluster/acme/plugins/{{ proxmox_acme_plugin_id }} --output-format json
  register: proxmox_acme_plugin_check
  failed_when: false
  changed_when: false
  tags: proxmox

- name: Configure Cloudflare DNS plugin
  become: true
  no_log: true
  ansible.builtin.command:
    cmd: >-
      pvesh create /cluster/acme/plugins
      -id {{ proxmox_acme_plugin_id }}
      -type dns
      -api cf
      -data {{ ("CF_Token=" + proxmox_acme_cloudflare_token) | b64encode }}
  when: proxmox_acme_plugin_check.rc != 0
  changed_when: true
  tags: proxmox

- name: Check node ACME domain configuration
  become: true
  ansible.builtin.command:
    cmd: pvesh get /nodes/{{ proxmox_api_node }}/config --output-format json
  register: proxmox_node_config
  changed_when: false
  tags: proxmox

- name: Configure node ACME domain
  become: true
  ansible.builtin.command:
    cmd: >-
      pvesh set /nodes/{{ proxmox_api_node }}/config
      -acme account={{ proxmox_acme_account }}
      -acmedomain0 "domain={{ proxmox_acme_domain }},plugin={{ proxmox_acme_plugin_id }}"
  when: >-
    (proxmox_node_config.stdout | from_json).acmedomain0 is not defined or
    proxmox_acme_domain not in (proxmox_node_config.stdout | from_json).acmedomain0
  changed_when: true
  tags: proxmox

- name: Check if ACME certificate exists
  become: true
  ansible.builtin.stat:
    path: /etc/pve/local/pveproxy-ssl.pem
  register: proxmox_acme_cert_stat
  tags: proxmox

- name: Check if certificate is from Let's Encrypt
  become: true
  ansible.builtin.command:
    cmd: openssl x509 -in /etc/pve/local/pveproxy-ssl.pem -noout -issuer
  register: proxmox_acme_cert_issuer
  changed_when: false
  when: proxmox_acme_cert_stat.stat.exists
  tags: proxmox

- name: Order ACME certificate
  become: true
  ansible.builtin.command:
    cmd: pvesh create /nodes/{{ proxmox_api_node }}/certificates/acme/certificate
  when: >-
    not proxmox_acme_cert_stat.stat.exists or
    'Let' not in proxmox_acme_cert_issuer.stdout
  changed_when: true
  tags: proxmox
