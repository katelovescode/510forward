---
argument_specs:
  main:
    short_description: Configure Proxmox repositories and storage
    description: >
      Configures the Proxmox no-subscription apt repository and ensures
      the local storage datastore has snippets enabled.
    options:
      proxmox_repo_uri:
        type: str
        required: true
        description: Base URI for the Proxmox apt repository.
      proxmox_repo_suite:
        type: str
        required: true
        description: Debian suite name for the repository (e.g. trixie).
      proxmox_repo_components:
        type: str
        required: true
        description: Repository component (e.g. pve-no-subscription).

  repos:
    short_description: Configure Proxmox apt repositories
    description: >
      Removes the default Proxmox enterprise and Ceph repositories and
      configures the no-subscription repository in deb822 format.
    options:
      proxmox_repo_uri:
        type: str
        required: true
        description: Base URI for the Proxmox apt repository.
      proxmox_repo_suite:
        type: str
        required: true
        description: Debian suite name for the repository (e.g. trixie).
      proxmox_repo_components:
        type: str
        required: true
        description: Repository component (e.g. pve-no-subscription).

  storage:
    short_description: Configure Proxmox local storage content types
    description: >
      Ensures the local storage datastore on the Proxmox node has snippets
      enabled in its content types. Idempotent — only runs pvesm set if
      snippets are not already present.
    options: {}
