---
argument_specs:
  main:
    short_description: Configure Proxmox repositories, storage, TLS, and DNS
    description: >
      Configures the Proxmox no-subscription apt repository, ensures the
      local storage datastore has snippets enabled, issues a wildcard TLS
      certificate via ACME DNS-01 (Cloudflare), and configures DNS resolvers.
    options:
      proxmox_repo_uri:
        type: str
        required: true
        description: Base URI for the Proxmox apt repository.
      proxmox_repo_suite:
        type: str
        required: true
        description: Debian suite name for the repository (e.g. trixie).
      proxmox_repo_components:
        type: str
        required: true
        description: Repository component (e.g. pve-no-subscription).
      proxmox_acme_account:
        type: str
        required: true
        description: Name of the ACME account to create/use in Proxmox.
      proxmox_acme_plugin_id:
        type: str
        required: true
        description: ID of the ACME DNS plugin to create/use in Proxmox.
      proxmox_acme_domain:
        type: str
        required: true
        description: Domain to issue the certificate for (e.g. *.510forward.space).
      proxmox_acme_tos_url:
        type: str
        required: true
        description: Let's Encrypt Terms of Service URL to agree to on account creation.
      proxmox_dns_servers:
        type: list
        elements: str
        required: true
        description: Ordered list of nameserver IPs to write to /etc/resolv.conf.

  repos:
    short_description: Configure Proxmox apt repositories
    description: >
      Removes the default Proxmox enterprise and Ceph repositories and
      configures the no-subscription repository in deb822 format.
    options:
      proxmox_repo_uri:
        type: str
        required: true
        description: Base URI for the Proxmox apt repository.
      proxmox_repo_suite:
        type: str
        required: true
        description: Debian suite name for the repository (e.g. trixie).
      proxmox_repo_components:
        type: str
        required: true
        description: Repository component (e.g. pve-no-subscription).

  storage:
    short_description: Configure Proxmox local storage content types
    description: >
      Ensures the local storage datastore on the Proxmox node has snippets
      enabled in its content types. Idempotent — only runs pvesm set if
      snippets are not already present.
    options: {}
  dns:
    short_description: Configure DNS resolvers
    description: >
      Templates /etc/resolv.conf with the configured nameservers and domain
      search suffix.
    options:
      proxmox_dns_servers:
        type: list
        elements: str
        required: true
        description: Ordered list of nameserver IPs to write to /etc/resolv.conf.
