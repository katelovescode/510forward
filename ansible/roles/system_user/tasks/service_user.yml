---
# This role handles system service user creation with passwordless sudo
# Extracted from lab_bootstrap.yml for the opentofu service user pattern

- name: Create system {{ system_user_name }} user
  become: true
  ansible.builtin.user:
    name: "{{ system_user_name }}"
    shell: /bin/bash

- name: Grant {{ system_user_name }} user sudo
  become: true
  community.general.sudoers:
    name: "{{ system_user_name }}"
    commands: ALL
    runas: ALL
    state: present
    user: "{{ system_user_name }}"
    nopassword: true
