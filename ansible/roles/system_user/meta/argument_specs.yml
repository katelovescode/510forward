---
argument_specs:
  admin_user:
    short_description: Create a system admin user with password, sudo, and static SSH key
    options:
      proxmox_admin_system_user:
        type: str
        required: true
        description: >
          Username for the admin system user.
          Set in group_vars/proxmox_nodes/vars.yml.
      proxmox_admin_password_salt:
        type: str
        required: true
        description: >
          Stable salt used to reproduce the admin user's password hash across runs.
          Set in host_vars/enterprise/secrets.yml.
      sysadmin_public_key:
        type: str
        required: true
        description: >
          SSH public key to authorize for the admin user.
          Set in group_vars/all/secrets.yml.

  service_user:
    short_description: Create a passwordless service user with sudo
    options:
      system_user_name:
        type: str
        required: true
        description: Username for the service user (e.g. opentofu, ansible).
