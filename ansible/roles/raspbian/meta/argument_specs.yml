---
argument_specs:
  main:
    short_description: Configure Raspberry Pi OS (Raspbian) hosts
    description: >
      Applies Raspbian-specific desktop configuration.
    options:
      raspbian_desktop_user:
        type: str
        required: true
        description: User account whose desktop config is managed (e.g. kate).
      raspbian_clock_time_format:
        type: str
        required: true
        description: >
          strftime format string for the wf-panel-pi clock widget.
          e.g. "%R" for 24h, "%l:%M %p" for 12h.
      raspbian_kiosk_enabled:
        type: bool
        required: false
        default: false
        description: >
          Whether to configure a dedicated kiosk user with Chromium
          launching in kiosk mode on autologin.
      raspbian_kiosk_url:
        type: str
        required: false
        description: >
          URL to open in kiosk mode. Required when raspbian_kiosk_enabled is true.
      raspbian_kiosk_user:
        type: str
        required: false
        default: kiosk
        description: Username for the dedicated kiosk OS user.
      raspbian_kiosk_ha_token_op_item:
        type: str
        required: false
        description: >
          1Password item title containing a long-lived Home Assistant access token
          in a field labelled 'access_token'. When set, deploys a Chromium extension
          that injects the token into localStorage so the kiosk auto-authenticates
          after HA restarts.
