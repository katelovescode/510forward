---
argument_specs:
  main:
    short_description: Manage Home Assistant configuration
    description: >
      Manages /config/configuration.yaml on a Home Assistant OS host via the SSH
      add-on. Derives trusted_proxies from the norville inventory host. Restarts
      HA core when configuration changes.
    options:
      domain:
        type: str
        required: true
        description: >
          Local domain, e.g. 510forward.space. Used in the configuration template.
          Defined in group_vars/all/vars.yml.
