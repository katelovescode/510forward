---
- name: Read Home Assistant Ansible API token
  ansible.builtin.include_role:
    name: onepassword
  vars:
    onepassword_action: read
    onepassword_item:
      title: "Home Assistant Ansible API Token"
  no_log: true
  tags: [home_assistant, configuration]

- name: Set API token fact
  ansible.builtin.set_fact:
    _home_assistant_api_token: >-
      {{
        onepassword_item_result.fields |
        selectattr('id', 'equalto', 'credential') |
        map(attribute='value') | first
      }}
  no_log: true
  tags: [home_assistant, configuration]

- name: Template configuration.yaml
  ansible.builtin.template:
    src: configuration.yaml.j2
    dest: /config/configuration.yaml
    owner: root
    group: root
    mode: "0644"
  tags: [home_assistant, configuration]
  notify: Restart Home Assistant core

- name: Read deployed configuration.yaml
  ansible.builtin.slurp:
    src: /config/configuration.yaml
  register: _home_assistant_config_raw
  tags: [home_assistant, configuration]

- name: Assert trusted_proxies contains norville IP
  ansible.builtin.assert:
    that:
      - hostvars['norville']['ip_address'] in (_home_assistant_config_raw.content | b64decode)
    fail_msg: "trusted_proxies missing {{ hostvars['norville']['ip_address'] }} in /config/configuration.yaml"
    success_msg: "trusted_proxies OK: {{ hostvars['norville']['ip_address'] }} is present"
  tags: [home_assistant, configuration]

- name: Verify Home Assistant API is responding
  ansible.builtin.uri:
    url: "http://localhost:8123/api/"
    headers:
      Authorization: "Bearer {{ _home_assistant_api_token }}"
    status_code: 200
  no_log: true
  tags: [home_assistant, configuration]
