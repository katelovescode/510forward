---
- name: Restart Home Assistant core
  ansible.builtin.uri:
    url: "http://localhost:8123/api/services/homeassistant/restart"
    method: POST
    headers:
      Authorization: "Bearer {{ _home_assistant_api_token }}"
    timeout: 5
  no_log: true
  failed_when: false
  notify: Wait for Home Assistant to come back

- name: Wait for Home Assistant to come back
  ansible.builtin.uri:
    url: "http://localhost:8123/api/"
    headers:
      Authorization: "Bearer {{ _home_assistant_api_token }}"
    status_code: 200
  register: _ha_ready
  until: _ha_ready.status == 200
  retries: 30
  delay: 10
  no_log: true
