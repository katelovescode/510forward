---
- name: Check if item exists
  ansible.builtin.command:
    cmd: >-
      op item get '{{ onepassword_item.title }}'
      --vault "{{ onepassword_vault }}"
      --reveal
      --format json
  become: true
  become_user: "{{ onepassword_become_user }}"
  delegate_to: localhost
  register: _onepassword_existing
  changed_when: false
  failed_when: false
  no_log: true

- name: Set existing item facts
  ansible.builtin.set_fact:
    _onepassword_exists: "{{ _onepassword_existing.rc == 0 and _onepassword_existing.stdout | length > 0 }}"
    _onepassword_existing_item: >-
      {{
        _onepassword_existing.stdout | from_json
        if _onepassword_existing.rc == 0 and _onepassword_existing.stdout | length > 0
        else {}
      }}
  no_log: true

- name: Handle category mismatch
  when:
    - _onepassword_exists | bool
    - _onepassword_existing_item.category | upper != onepassword_item.category | upper
  block:
    - name: Delete item with wrong category
      ansible.builtin.command:
        cmd: op item delete '{{ _onepassword_existing_item.id }}' --vault "{{ onepassword_vault }}"
      become: true
      become_user: "{{ onepassword_become_user }}"
      delegate_to: localhost
      changed_when: true
      no_log: true

    - name: Reset existence facts
      ansible.builtin.set_fact:
        _onepassword_exists: false
        _onepassword_existing_item: {}
      no_log: true

- name: Resolve fields
  ansible.builtin.set_fact:
    _onepassword_resolved_fields: >-
      {%- set resolved = [] -%}
      {%- for field in onepassword_item.fields -%}
        {%- if field.type | upper == 'CONCEALED' and field.value is not defined -%}
          {%- set existing_value = _onepassword_existing_item.fields | default([]) |
              selectattr('id', 'equalto', field.id) | map(attribute='value') | first | default('') -%}
          {%- if existing_value -%}
            {%- set _ = resolved.append(field | combine({'value': existing_value})) -%}
          {%- else -%}
            {%- set _ = resolved.append(field | combine({'value': lookup('community.general.random_string',
                length=field.length | default(32),
                special=field.special | default(true))})) -%}
          {%- endif -%}
        {%- else -%}
          {%- set _ = resolved.append(field) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ resolved }}
  no_log: true

- name: Check if write is needed
  ansible.builtin.set_fact:
    _onepassword_needs_write: >-
      {%- set current = _onepassword_existing_item.fields | default([]) -%}
      {%- set needs_write = namespace(value=false) -%}
      {%- if not _onepassword_exists -%}
        {%- set needs_write.value = true -%}
      {%- endif -%}
      {%- for field in onepassword_item.fields -%}
        {%- if field.value is defined -%}
          {%- set stored = current | selectattr('id', 'equalto', field.id) |
              map(attribute='value') | first | default('') -%}
          {%- if field.value | string != stored | string -%}
            {%- set needs_write.value = true -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
      {{ needs_write.value }}
  no_log: true

- name: Detect orphaned fields
  ansible.builtin.set_fact:
    _onepassword_orphaned_fields: >-
      {%- set declared_ids = onepassword_item.fields | map(attribute='id') | list -%}
      {%- set is_ansible_item = 'ansible' in (_onepassword_existing_item.tags | default([])) -%}
      {%- set orphaned = [] -%}
      {%- if _onepassword_needs_write | bool and _onepassword_exists | bool and is_ansible_item -%}
        {%- for f in _onepassword_existing_item.fields | default([]) -%}
          {%- if f.id not in declared_ids -%}
            {%- set _ = orphaned.append(f.id) -%}
          {%- endif -%}
        {%- endfor -%}
      {%- endif -%}
      {{ orphaned }}
  no_log: true

- name: Write item
  when: _onepassword_needs_write | bool
  block:
    - name: Set temp file path
      ansible.builtin.set_fact:
        _onepassword_temp_file: "/tmp/op-item-{{ onepassword_item.title | regex_replace('[^a-zA-Z0-9]', '_') }}.json"
      no_log: true

    - name: Template item JSON
      ansible.builtin.template:
        src: item_template.j2
        dest: "{{ _onepassword_temp_file }}"
        mode: "0600"
      delegate_to: localhost
      no_log: true

    - name: Create or update item
      ansible.builtin.shell: # noqa: command-instead-of-shell
        cmd: >-
          {{ 'op item create' if not _onepassword_exists else 'op item edit ' + _onepassword_existing_item.id }}
          --template "{{ _onepassword_temp_file }}"
          --vault "{{ onepassword_vault }}"
          --tags "{{ (['ansible'] + (onepassword_item.tags | default([]))) | join(',') }}"
          </dev/null
        executable: /bin/bash
      become: true
      become_user: "{{ onepassword_become_user }}"
      delegate_to: localhost
      changed_when: true
      no_log: true

    - name: Remove temp file
      ansible.builtin.file:
        path: "{{ _onepassword_temp_file }}"
        state: absent
      delegate_to: localhost

- name: Notice orphaned fields
  when: _onepassword_orphaned_fields | length > 0
  ansible.builtin.debug:
    msg: >-
      Item '{{ onepassword_item.title }}' has undeclared fields: {{ _onepassword_orphaned_fields }}.
      These were not modified. Remove manually in 1Password if no longer needed.

- name: Read item result
  ansible.builtin.include_tasks: read.yml
