---
# This task validates required variables for 1Password operations.
# Use this as a reusable component for any entry point.

- name: Validate Required Variables
  ansible.builtin.fail:
    msg: "Required variable '{{ item }}' is not defined"
  when: item not in lookup('varnames', item)
  loop:
    - onepassword_item_title
    - onepassword_vault
    - onepassword_become_user
