---
argument_specs:
  main:
    short_description: Manage 1Password items
    description: >
      Manages 1Password items. Supports upsert, delete, and read actions.
      Always sets onepassword_item_result after any action.
    options:
      onepassword_action:
        type: str
        required: true
        description: >
          Action to perform. One of: upsert, delete, read.
      onepassword_vault:
        type: str
        required: true
        description: >
          1Password vault name. Defined in group_vars/all/vars.yml, pulled from .envrc.
      onepassword_become_user:
        type: str
        required: true
        description: >
          Local user for op CLI. Defined in group_vars/all/vars.yml, pulled from .envrc.
      onepassword_item:
        type: dict
        required: true
        description: >
          Item definition. Required: title (str), category (str — 1Password-native: LOGIN,
          PASSWORD, API_CREDENTIAL, etc.). Optional: tags (list of str — role always adds
          'ansible'; callers add 'ansible-managed' or 'ansible-bootstrap'), fields (list of
          dicts). Each field: id (str), type (str), label (str), value (str, optional),
          purpose (str, optional), length (int, default 32), special (bool, default true).
          CONCEALED fields with no value are auto-generated on create and preserved on update.
