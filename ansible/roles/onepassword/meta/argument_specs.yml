---
argument_specs:
  main:
    short_description: Manage 1Password items
    description: >
      Manages 1Password items. Supports upsert, delete, and read actions.
      Always sets onepassword_item_result after any action.
    options:
      onepassword_action:
        type: str
        required: true
        description: >
          Action to perform. One of: upsert, delete, read.
      onepassword_vault:
        type: str
        required: true
        description: >
          Name or UUID of the 1Password vault to operate on.
          Defined in group_vars/all/secrets.yml.
      onepassword_become_user:
        type: str
        required: true
        description: >
          Local user to become when running op CLI commands.
          Defined in group_vars/all/secrets.yml.
      onepassword_item:
        type: dict
        required: true
        description: >
          Item definition. Required key: title (str).
          Optional keys: username (str), password (str),
          custom_fields (list of dicts with label, value, field_type).
          Password is auto-generated on create and preserved on update
          if omitted. Provide explicitly to set or rotate a password.
