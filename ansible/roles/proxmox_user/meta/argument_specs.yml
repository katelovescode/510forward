---
argument_specs:
  admin_user:
    short_description: Create a Proxmox PAM admin user with the Administrator role
    options:
      proxmox_admin_api_user:
        type: str
        required: true
        description: >
          Proxmox user ID (e.g. kate@pam).
          Derived from proxmox_admin_user in group_vars/proxmox_nodes/vars.yml.
      proxmox_api_node:
        type: str
        required: true
        description: >
          Proxmox API hostname.
          Set in group_vars/all/vars.yml.
      admin_email:
        type: str
        required: true
        description: >
          Email address for the admin user.
          Set in group_vars/all/vars.yml.

  service_user:
    short_description: Create a Proxmox service user with a dedicated group and role
    options:
      proxmox_user_service_user_name:
        type: str
        required: true
        description: Username for the service user (e.g. opentofu, ansible).
      proxmox_user_service_user_roles:
        type: list
        elements: dict
        required: false
        description: >
          List of roles to create and assign to the group. Each entry must have
          'name' (role ID) and 'privs' (list of privilege strings).
          Mutually exclusive with proxmox_user_service_user_privs — use one or
          the other. Use this when multiple distinct roles are needed (e.g. HA).
      proxmox_user_service_user_privs:
        type: list
        elements: str
        required: false
        description: >
          Privilege list for a single role named after the user. Shorthand for
          the common case. Ignored when proxmox_user_service_user_roles is set.
      proxmox_user_service_user_realm:
        type: str
        required: false
        description: Proxmox realm for the user. Defaults to 'pam'. Use 'pve' for API-only users that don't need an OS account.
      proxmox_api_node:
        type: str
        required: true
        description: >
          Proxmox API hostname.
          Set in group_vars/all/vars.yml.

  api_token:
    short_description: Create a Proxmox API token and store it in 1Password
    options:
      proxmox_user_api_token_user:
        type: str
        required: true
        description: Username whose Proxmox API token to manage (e.g. opentofu, ansible).
      proxmox_user_api_token_item_title:
        type: str
        required: true
        description: 1Password item title for the API token.
      proxmox_user_api_token_realm:
        type: str
        required: false
        description: Proxmox realm for the user. Defaults to 'pam'. Must match the realm used when creating the user.
