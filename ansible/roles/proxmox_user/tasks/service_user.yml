---
# This role handles Proxmox service user creation with group and role assignment.
# Supports multiple roles via proxmox_user_service_user_roles (list of {name, privs}).
# Falls back to a single role named after the user when only
# proxmox_user_service_user_privs is provided (backward compat).

- name: Read Proxmox root password
  ansible.builtin.include_tasks: read_root_password.yml

- name: Resolve roles list
  ansible.builtin.set_fact:
    _proxmox_user_service_user_roles: >-
      {{
        proxmox_user_service_user_roles
        if proxmox_user_service_user_roles is defined
        else [{'name': proxmox_user_service_user_name, 'privs': proxmox_user_service_user_privs}]
      }}

- name: Check Proxmox roles exist
  become: true
  ansible.builtin.command:
    cmd: pvesh get /access/roles/{{ item.name }} --output-format json
  loop: "{{ _proxmox_user_service_user_roles }}"
  register: _proxmox_user_role_checks
  failed_when: false
  changed_when: false
  delegate_to: enterprise

- name: Create missing Proxmox roles
  become: true
  ansible.builtin.command:
    cmd: pvesh create /access/roles -roleid {{ item.item.name }} -privs '{{ item.item.privs | join(",") }}'
  loop: "{{ _proxmox_user_role_checks.results }}"
  when: item.rc != 0
  changed_when: true
  delegate_to: enterprise

- name: Configure Proxmox group, ACLs, and user
  delegate_to: enterprise
  module_defaults:
    community.proxmox.proxmox_group:
      api_host: "{{ proxmox_api_node }}"
      api_user: root@pam
      api_password: "{{ proxmox_user_root_password }}"
    community.proxmox.proxmox_access_acl:
      api_host: "{{ proxmox_api_node }}"
      api_user: root@pam
      api_password: "{{ proxmox_user_root_password }}"
    community.proxmox.proxmox_user:
      api_host: "{{ proxmox_api_node }}"
      api_user: root@pam
      api_password: "{{ proxmox_user_root_password }}"
  block:
    - name: Group
      community.proxmox.proxmox_group: # noqa: args[module]
        groupid: "{{ proxmox_user_service_user_name }}"
        state: present
        comment: Managed by Ansible

    - name: Grant roles to Proxmox group - {{ proxmox_user_service_user_name }}
      community.proxmox.proxmox_access_acl: # noqa: args[module]
        path: /
        roleid: "{{ item.name }}"
        ugid: "{{ proxmox_user_service_user_name }}"
        state: present
        type: group
      loop: "{{ _proxmox_user_service_user_roles }}"

    - name: Create Proxmox user - {{ proxmox_user_service_user_name }}
      community.proxmox.proxmox_user: # noqa: args[module]
        comment: "Managed by Ansible"
        userid: "{{ proxmox_user_service_user_name }}@{{ proxmox_user_service_user_realm | default('pam') }}"
        state: present
        groups:
          - "{{ proxmox_user_service_user_name }}"
        email: "{{ proxmox_user_service_user_name }}@510forward.space"
