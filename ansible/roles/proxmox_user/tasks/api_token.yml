---
# Create a Proxmox API token and store it in 1Password.
# Idempotent: skips creation if the token exists in both Proxmox and 1Password.
# If out of sync (exists in one but not the other), deletes and recreates.
#
# Required vars:
#   proxmox_api_token_user        - system username (e.g. opentofu, ansible)
#   proxmox_api_token_item_title  - 1Password item title for the token

- name: Check if {{ proxmox_api_token_user }} token exists in 1Password
  become: true
  become_user: "{{ onepassword_become_user }}"
  delegate_to: localhost
  no_log: true
  ansible.builtin.command:
    cmd: >-
      op item get "{{ proxmox_api_token_item_title }}"
      --vault "{{ onepassword_vault }}"
  register: proxmox_api_token_1password_check
  failed_when: false
  changed_when: false

- name: Check if {{ proxmox_api_token_user }} token exists in Proxmox
  become: true
  ansible.builtin.command:
    cmd: >-
      pvesh get /access/users/{{ proxmox_api_token_user }}@pam/token/{{ proxmox_api_token_user }}_token
  register: proxmox_api_token_proxmox_check
  failed_when: false
  changed_when: false

- name: Set {{ proxmox_api_token_user }} token exists fact
  ansible.builtin.set_fact:
    proxmox_api_token_exists: >-
      {{
        (proxmox_api_token_1password_check.rc == 0 and
        proxmox_api_token_proxmox_check.rc == 0) | bool
      }}

- name: Create or recreate {{ proxmox_api_token_user }} API token
  when: not proxmox_api_token_exists
  block:
    - name: Delete existing Proxmox token if not in 1Password
      become: true
      ansible.builtin.command:
        cmd: pvesh delete /access/users/{{ proxmox_api_token_user }}@pam/token/{{ proxmox_api_token_user }}_token
      failed_when: false
      changed_when: true

    - name: Create {{ proxmox_api_token_user }} API token
      become: true
      no_log: true
      ansible.builtin.command:
        cmd: >-
          pvesh create /access/users/{{ proxmox_api_token_user }}@pam/token/{{ proxmox_api_token_user }}_token
          --privsep 0 --comment='Managed by Ansible' --output-format=json
      register: proxmox_api_token_result
      changed_when: true

    - name: Store {{ proxmox_api_token_user }} token in 1Password
      no_log: true
      ansible.builtin.include_role:
        name: onepassword
      vars:
        onepassword_action: upsert
        onepassword_item:
          title: "{{ proxmox_api_token_item_title }}"
          username: "{{ (proxmox_api_token_result.stdout | from_json)['full-tokenid'] }}"
          password: "{{ (proxmox_api_token_result.stdout | from_json).value }}"
