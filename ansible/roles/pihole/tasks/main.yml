---
- name: Install sqlite3
  become: true
  ansible.builtin.apt:
    name: sqlite3
    state: present
  tags: pihole

- name: Install Pi-hole
  ansible.builtin.import_tasks: install.yml

- name: Configure OS DNS resolver
  ansible.builtin.import_tasks: resolver.yml

- name: Configure DNS
  ansible.builtin.import_tasks: dns.yml

- name: Seed from replica (fresh primary install only)
  ansible.builtin.include_tasks: seed_from_replica.yml
  when:
    - pihole_primary | default(false)
    - not pihole_config_file.stat.exists

- name: Manage adlists
  ansible.builtin.include_tasks: adlists.yml
  when: pihole_primary | default(false)

- name: Install nebula-sync
  ansible.builtin.include_tasks: nebula_sync.yml
  when: pihole_primary | default(false)
