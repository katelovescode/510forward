---
# Pi-hole nodes must use public DNS for OS-level resolution to avoid a
# circular dependency where the host depends on its own Pi-hole being up.

- name: Install systemd-resolved
  become: true
  ansible.builtin.apt:
    name: systemd-resolved
    state: present
  tags: pihole

- name: Ensure systemd-resolved drop-in directory exists
  become: true
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: pihole

- name: Configure OS DNS resolver (systemd-resolved)
  become: true
  ansible.builtin.template:
    src: resolved.conf.j2
    dest: /etc/systemd/resolved.conf.d/ansible-dns.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart systemd-resolved
  tags: pihole

- name: Point /etc/resolv.conf at non-stub systemd-resolved config
  become: true
  ansible.builtin.file:
    src: /run/systemd/resolve/resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true
  tags: pihole
  # With DNSStubListener=no, the stub at 127.0.0.53 is gone. The symlink must
  # point to the non-stub resolv.conf which contains the actual upstream DNS
  # servers (1.1.1.1) rather than the now-disabled stub address.
