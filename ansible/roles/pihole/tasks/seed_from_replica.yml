---
# Seed the primary Pi-hole from the replica on fresh installs.
#
# After centaurus is rebuilt from scratch, andromeda holds the current gravity
# state (adlists, custom domain lists, groups). This task exports andromeda's
# teleporter backup and imports it here so centaurus comes up with full
# blocking lists instead of rebuilding from scratch.
#
# Gating (enforced by caller in main.yml):
#   - pihole_primary is true
#   - pihole_config_file.stat.exists was false at the start of install.yml
#     (i.e. this is a fresh install, not a reconfigure of an existing node)
#
# Ansible's settings and adlists tasks run after this and re-apply all
# code-managed values, so any settings differences imported from the replica
# are overwritten before the play finishes.

- name: Set replica host
  ansible.builtin.set_fact:
    _pihole_seed_replica: "{{ (groups['pihole_nodes'] | reject('equalto', inventory_hostname) | list)[0] }}"

- name: Check replica Pi-hole is reachable
  ansible.builtin.uri:
    url: "http://{{ hostvars[_pihole_seed_replica].ip_address }}/api/auth"
    method: GET
    status_code: 200
    timeout: 5
  register: _pihole_replica_reachable
  failed_when: false

- name: Seed from replica
  when: _pihole_replica_reachable.status == 200
  block:
    - name: Read Pi-hole admin password from 1Password
      no_log: true
      ansible.builtin.include_role:
        name: onepassword
      vars:
        onepassword_action: read
        onepassword_item:
          title: "Pi-hole Admin Password"

    - name: Set password fact
      no_log: true
      ansible.builtin.set_fact:
        _pihole_seed_password: >-
          {{ onepassword_item_result.fields | selectattr('id', 'equalto', 'password') | map(attribute='value') | first }}

    - name: Authenticate to replica Pi-hole
      no_log: true
      ansible.builtin.uri:
        url: "http://{{ hostvars[_pihole_seed_replica].ip_address }}/api/auth"
        method: POST
        body_format: json
        body:
          password: "{{ _pihole_seed_password }}"
        status_code: 200
      register: _pihole_replica_auth

    - name: Export teleporter from replica
      no_log: true
      ansible.builtin.uri:
        url: "http://{{ hostvars[_pihole_seed_replica].ip_address }}/api/teleporter?sid={{ _pihole_replica_auth.json.session.sid }}"
        method: GET
        dest: /tmp/pihole-teleporter-seed.zip
        return_content: false
      register: _pihole_teleporter_export

    - name: Authenticate to local Pi-hole
      no_log: true
      ansible.builtin.uri:
        url: "http://localhost/api/auth"
        method: POST
        body_format: json
        body:
          password: "{{ _pihole_seed_password }}"
        status_code: 200
      register: _pihole_local_auth

    - name: Import teleporter to local Pi-hole
      no_log: true
      ansible.builtin.uri:
        url: "http://localhost/api/teleporter?sid={{ _pihole_local_auth.json.session.sid }}"
        method: POST
        body_format: form-multipart
        body:
          file:
            filename: /tmp/pihole-teleporter-seed.zip
            mime_type: application/zip
        status_code: 200

    - name: Logout from replica Pi-hole
      no_log: true
      ansible.builtin.uri:
        url: "http://{{ hostvars[_pihole_seed_replica].ip_address }}/api/auth?sid={{ _pihole_replica_auth.json.session.sid }}"
        method: DELETE
        status_code: [200, 204, 410]
      failed_when: false

    - name: Logout from local Pi-hole
      no_log: true
      ansible.builtin.uri:
        url: "http://localhost/api/auth?sid={{ _pihole_local_auth.json.session.sid }}"
        method: DELETE
        status_code: [200, 204, 410]
      failed_when: false

  rescue:
    - name: Warn that seeding failed — bootstrap will continue
      ansible.builtin.debug:
        msg: >-
          Failed to seed Pi-hole from {{ _pihole_seed_replica }}. Bootstrap will
          continue with a fresh gravity database. Run 'make sync-pihole' after
          confirming both nodes are healthy to sync state from the replica.

  always:
    - name: Remove teleporter seed file
      ansible.builtin.file:
        path: /tmp/pihole-teleporter-seed.zip
        state: absent
