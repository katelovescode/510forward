---
# nebula-sync is installed as a systemd service + timer rather than using
# the binary's built-in CRON env var. This is intentional — systemd gives
# us consistent logging via journald, clean manual trigger semantics via
# systemctl start nebula-sync, and fits the rest of the stack.

- name: Download nebula-sync binary
  become: true
  ansible.builtin.get_url:
    url: "https://github.com/lovelaze/nebula-sync/releases/download/v{{ nebula_sync_version }}/nebula-sync_Linux_x86_64.tar.gz"
    dest: "/tmp/nebula-sync-{{ nebula_sync_version }}.tar.gz"
    mode: "0644"
    checksum: "sha256:{{ nebula_sync_checksum }}"

- name: Extract nebula-sync binary
  become: true
  ansible.builtin.unarchive:
    src: "/tmp/nebula-sync-{{ nebula_sync_version }}.tar.gz"
    dest: /usr/local/bin
    include:
      - nebula-sync
    remote_src: true
    mode: "0755"
    owner: root
    group: root

- name: Remove nebula-sync archive
  ansible.builtin.file:
    path: "/tmp/nebula-sync-{{ nebula_sync_version }}.tar.gz"
    state: absent

- name: Template nebula-sync env file
  become: true
  ansible.builtin.template:
    src: nebula_sync.env.j2
    dest: /etc/nebula-sync.env
    owner: root
    group: root
    mode: "0600"
  notify: Restart nebula-sync

- name: Template nebula-sync systemd service
  become: true
  ansible.builtin.template:
    src: nebula-sync.service.j2
    dest: /etc/systemd/system/nebula-sync.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart nebula-sync

- name: Template nebula-sync systemd timer
  become: true
  ansible.builtin.template:
    src: nebula-sync.timer.j2
    dest: /etc/systemd/system/nebula-sync.timer
    owner: root
    group: root
    mode: "0644"
  notify: Restart nebula-sync

- name: Enable and start nebula-sync timer
  become: true
  ansible.builtin.systemd:
    name: nebula-sync.timer
    enabled: true
    state: started
    daemon_reload: true
