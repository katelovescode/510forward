---
argument_specs:
  main:
    short_description: Install and configure GitLab CE
    description: >
      Installs GitLab CE at a pinned version via the official apt repository,
      configures it to run behind NPM (HTTP on port 80, external HTTPS URL),
      and manages the initial root password via 1Password ("GitLab Root Password").
    options:
      gitlab_version:
        type: str
        required: true
        description: >
          GitLab CE version to install, e.g. "18.5.2". Defined in
          host_vars/memory-alpha/vars.yml. Installation is skipped if the
          installed version matches.

      fqdn:
        type: str
        required: true
        description: >
          Fully qualified domain name for this host, e.g. memory-alpha.510forward.space.
          Used to set external_url in gitlab.rb. Defined in host_vars/memory-alpha/vars.yml.

      domain:
        type: str
        required: true
        description: >
          Local domain, e.g. 510forward.space. Defined in group_vars/all/vars.yml.

      onepassword_vault:
        type: str
        required: true
        description: >
          1Password vault name. Defined in group_vars/all/secrets.yml.

      onepassword_become_user:
        type: str
        required: true
        description: >
          Local user for op CLI. Defined in group_vars/all/secrets.yml.
