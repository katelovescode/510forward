---
- name: Ensure NPM directory exists
  become: true
  ansible.builtin.file:
    path: /opt/nginx-proxy-manager
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/nginx-proxy-manager/docker-compose.yml
    mode: "0644"

- name: Deploy NGINX Proxy Manager
  community.docker.docker_compose_v2:
    project_src: /opt/nginx-proxy-manager
    state: present

- name: Wait for NPM API to be ready
  ansible.builtin.wait_for:
    host: localhost
    port: 81
    delay: 10
    timeout: 120
