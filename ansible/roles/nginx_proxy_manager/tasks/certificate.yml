---
- name: Read Cloudflare API token from 1Password
  no_log: true
  ansible.builtin.command:
    cmd: op read "op://{{ onepassword_vault }}/Cloudflare API Token/credential"
  become: true
  become_user: "{{ onepassword_become_user }}"
  delegate_to: localhost
  register: nginx_proxy_manager_cloudflare_api_token_resolved
  changed_when: false

- name: Check if wildcard certificate already exists
  ansible.builtin.uri:
    url: "http://localhost:81/api/nginx/certificates"
    method: GET
    headers:
      Authorization: "Bearer {{ nginx_proxy_manager_auth_token }}"
    status_code: 200
  register: nginx_proxy_manager_existing_certs
  no_log: true

- name: Set cert exists fact
  ansible.builtin.set_fact:
    nginx_proxy_manager_wildcard_cert_id: >-
      {{
        (nginx_proxy_manager_existing_certs.json
        | selectattr('domain_names', 'contains', '*.' + domain)
        | map(attribute='id')
        | first)
        if (nginx_proxy_manager_existing_certs.json
        | selectattr('domain_names', 'contains', '*.' + domain)
        | list | length > 0)
        else ''
      }}

- name: Request wildcard certificate
  ansible.builtin.uri:
    url: "http://localhost:81/api/nginx/certificates"
    method: POST
    headers:
      Authorization: "Bearer {{ nginx_proxy_manager_auth_token }}"
    body_format: json
    body:
      provider: letsencrypt
      domain_names:
        - "*.{{ domain }}"
      dns_challenge: true
      dns_provider: cloudflare
      dns_provider_credentials: "dns_cloudflare_api_token={{ nginx_proxy_manager_cloudflare_api_token_resolved.stdout }}"
      propagation_seconds: 120
      letsencrypt_email: "{{ admin_email }}"
      letsencrypt_agree: true
    status_code: [200, 201]
  register: nginx_proxy_manager_cert_request
  no_log: true
  when: nginx_proxy_manager_wildcard_cert_id == ''

- name: Set cert ID from new request
  ansible.builtin.set_fact:
    nginx_proxy_manager_wildcard_cert_id: "{{ nginx_proxy_manager_cert_request.json.id }}"
  when: nginx_proxy_manager_wildcard_cert_id == ''

- name: Wait for certificate to be ready
  ansible.builtin.uri:
    url: "http://localhost:81/api/nginx/certificates/{{ nginx_proxy_manager_wildcard_cert_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ nginx_proxy_manager_auth_token }}"
    status_code: 200
  register: nginx_proxy_manager_cert_status
  until: >-
    nginx_proxy_manager_cert_status.json.meta.status is defined and
    nginx_proxy_manager_cert_status.json.meta.status == 'ready'
  failed_when: >-
    nginx_proxy_manager_cert_status.json.meta.status is defined and
    nginx_proxy_manager_cert_status.json.meta.status == 'failed'
  retries: 24
  delay: 10
  no_log: true
  when: nginx_proxy_manager_wildcard_cert_id != ''
