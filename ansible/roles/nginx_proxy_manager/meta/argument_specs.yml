---
argument_specs:
  main:
    short_description: Deploy and configure NGINX Proxy Manager
    description: >
      Deploys NGINX Proxy Manager via Docker Compose, stores admin credentials
      in 1Password, rotates the default password on first run, and configures
      proxy hosts via the NPM REST API.
    options:
      # ################################
      # Shared vars — from group_vars/all/vars.yml
      # ################################
      admin_email:
        type: str
        required: true
        description: >
          Email address for the NPM admin account. Used as the login identity
          and replaces the NPM default (admin@example.com) on first run.

      domain:
        type: str
        required: true
        description: >
          Local domain suffix, e.g. 510forward.space. Appended to each
          proxy host subdomain to form the full domain name.

      ansible_user:
        type: str
        required: true
        description: >
          Ansible connection user. Passed to the docker role so the user
          is added to the docker group.

      # ################################
      # Shared vars — from group_vars/all/secrets.yml
      # ################################
      onepassword_vault:
        type: str
        required: true
        description: >
          1Password vault name. Defined in group_vars/all/vars.yml, pulled from .envrc.

      onepassword_become_user:
        type: str
        required: true
        description: >
          Local user for op CLI. Defined in group_vars/all/vars.yml, pulled from .envrc.

      # ################################
      # Host vars — from host_vars/norville/vars.yml
      # ################################
      nginx_proxy_manager_certificate_domain:
        type: str
        required: true
        description: >
          Wildcard domain for the Let's Encrypt certificate, e.g. *.510forward.space.
          Issued via Cloudflare DNS-01 challenge using the "Cloudflare DNS API Token"
          item from 1Password.

      nginx_proxy_manager_default_access_list_name:
        type: str
        required: false
        description: >
          Name of the NPM access list to apply to all proxy hosts by default.
          If not set, all proxy hosts are unrestricted (access_list_id 0).

      nginx_proxy_manager_default_access_list_clients:
        type: list
        required: false
        description: >
          Client rules for the default access list. Each entry needs
          `address` (IP/CIDR or "all") and `directive` ("allow" or "deny").
          Only used when nginx_proxy_manager_default_access_list_name is set.

      nginx_proxy_manager_proxy_hosts:
        type: list
        required: true
        description: >
          List of proxy host definitions to configure via the NPM API.
          Each entry requires: subdomain (str), host (str), port (int).
          Optional: scheme (str, default 'http'),
          allow_websocket_upgrade (bool, default false),
          advanced_config (str, default '') — raw nginx directives injected into the server block,
          access_list_id (int) — overrides the default access list; use 0 to disable restriction.
