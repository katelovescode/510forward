---
# Interactive apt upgrade for all apt-managed hosts.
#
# Usage:
#   make upgrade                    — all apt-managed hosts
#   make upgrade LIMIT=andromeda    — single host
#   make upgrade LIMIT=qemu_vms     — group
#
# Hosts are processed one at a time (serial: 1) to avoid taking both
# Pi-hole nodes down simultaneously.
#
# Excludes self_managed_os hosts

- name: Upgrade apt packages
  hosts: all:!self_managed_os
  serial: 1
  gather_facts: false
  tasks:
    - name: Update apt cache
      become: true
      ansible.builtin.apt:
        update_cache: true
      tags: upgrade

    - name: List upgradable packages
      become: true
      ansible.builtin.command:
        cmd: apt list --upgradable
      changed_when: false
      register: upgradable
      tags: upgrade

    - name: Show upgradable packages
      ansible.builtin.debug:
        msg: "{{ upgradable.stdout_lines }}"
      tags: upgrade

    - name: Upgrade
      when: upgradable.stdout_lines | length > 1
      tags: upgrade
      block:
        - name: Prompt to upgrade
          ansible.builtin.pause:
            prompt: "{{ inventory_hostname }}: {{ upgrade_risk }}\nUpgrade? [y/N]"
          register: upgrade_confirm

        - name: Perform upgrade
          when: upgrade_confirm.user_input | lower == 'y'
          block:
            - name: Upgrading packages (this may take a few minutes)
              become: true
              ansible.builtin.apt:
                upgrade: dist
              environment:
                DEBIAN_FRONTEND: noninteractive

            - name: Check if reboot required
              ansible.builtin.stat:
                path: /var/run/reboot-required
              register: reboot_required

            - name: Reboot if required
              when: reboot_required.stat.exists
              block:
                - name: Prompt to reboot
                  ansible.builtin.pause:
                    prompt: "{{ inventory_hostname }} requires a reboot. Reboot now? [y/N]"
                  register: reboot_confirm

                - name: Reboot
                  become: true
                  ansible.builtin.reboot:
                  when: reboot_confirm.user_input | lower == 'y'
