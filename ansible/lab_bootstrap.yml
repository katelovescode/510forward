---
# One-time bootstrap playbook.
# Runs as root since the ansible user does not exist yet.
#
# Prerequisites:
#   - "Proxmox Root User" must exist in 1Password with the root@pam password
#     set during Proxmox installation. Bootstrap cannot create this — it must
#     be added manually before running.

- name: Bootstrap - Pre-flight Validation
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Verify proxmox_admin_password_salt is set
      ansible.builtin.assert:
        that:
          - hostvars['enterprise']['proxmox_admin_password_salt'] is defined
          - hostvars['enterprise']['proxmox_admin_password_salt'] | string | length > 0
        fail_msg: "proxmox_admin_password_salt is not defined. Set it in host_vars/enterprise/secrets.yml."

    - name: Update known_hosts for enterprise
      ansible.builtin.include_role:
        name: identity
        tasks_from: known_hosts
      vars:
        identity_target: "enterprise"

    - name: Verify enterprise is reachable
      ansible.builtin.wait_for:
        host: "{{ hostvars['enterprise'].ansible_host }}"
        port: 22
        timeout: 10
      delegate_to: localhost

- name: Bootstrap - Ansible User
  hosts: enterprise
  gather_facts: false
  remote_user: root
  vars:
    ansible_user: root
  roles:
    - ansible

- name: Bootstrap - DNS
  hosts: enterprise
  gather_facts: false
  remote_user: root
  vars:
    ansible_user: root
  tasks:
    - name: Check if DNS is working
      ansible.builtin.command:
        cmd: getent hosts cloud-images.ubuntu.com
      register: dns_check
      failed_when: false
      changed_when: false

    - name: Set temporary upstream DNS if resolution is failing
      become: true
      ansible.builtin.copy:
        content: "nameserver 1.1.1.1\n"
        dest: /etc/resolv.conf
        mode: "0644"
      when: dns_check.rc != 0

- name: Bootstrap - Proxmox Admin User
  hosts: enterprise
  remote_user: root
  tasks:
    - name: Ensure Proxmox admin password exists in 1Password
      no_log: true
      ansible.builtin.include_role:
        name: onepassword
      vars:
        onepassword_action: upsert
        onepassword_item:
          title: "Proxmox Admin User"
          username: "{{ proxmox_admin_system_user }}"
          # custom_fields:
          #   - label: Notes
          #     value: "Managed by Ansible bootstrap. Do not rename this item."
          #     field_type: STRING

    - name: Create system admin user
      become: true
      no_log: true
      ansible.builtin.user:
        name: "{{ proxmox_admin_system_user }}"
        shell: /bin/bash
        password: >-
          {{
            onepassword_item_result.fields |
            selectattr('id', 'equalto', 'password') |
            map(attribute='value') | first
            | password_hash(salt=proxmox_admin_password_salt, hashtype='sha512')
          }}

    - name: Grant admin user sudo
      become: true
      community.general.sudoers:
        name: "{{ proxmox_admin_system_user }}"
        commands: ALL
        runas: ALL
        state: present
        user: "{{ proxmox_admin_system_user }}"
        nopassword: false

    - name: Authorize sysadmin SSH key for admin user
      become: true
      ansible.posix.authorized_key:
        user: "{{ proxmox_admin_system_user }}"
        key: "{{ sysadmin_public_key }}"

    - name: Read Proxmox root password from 1Password
      no_log: true
      ansible.builtin.include_role:
        name: onepassword
      vars:
        onepassword_action: read
        onepassword_item:
          title: "Proxmox Root User"

    - name: Create Proxmox API user
      community.proxmox.proxmox_user: # noqa: args[module]
        comment: "Managed by Ansible"
        userid: "{{ proxmox_admin_api_user }}"
        api_host: "{{ proxmox_api_node }}"
        api_user: root@pam
        api_password: >-
          {{
            onepassword_item_result.fields |
            selectattr('id', 'equalto', 'password') |
            map(attribute='value') | first
          }}
        validate_certs: false
        state: present
        email: "{{ admin_email }}"

    - name: Grant Proxmox API user Administrator role
      community.proxmox.proxmox_access_acl: # noqa: args[module]
        path: /
        roleid: Administrator
        ugid: "{{ proxmox_admin_api_user }}"
        api_host: "{{ proxmox_api_node }}"
        api_user: root@pam
        api_password: >-
          {{
            onepassword_item_result.fields |
            selectattr('id', 'equalto', 'password') |
            map(attribute='value') | first
          }}
        validate_certs: false
        state: present
        type: user

- name: Bootstrap - Proxmox OpenTofu User
  hosts: enterprise
  remote_user: root
  tasks:
    - name: Create system opentofu user
      become: true
      ansible.builtin.user:
        name: opentofu
        shell: /bin/bash

    - name: Grant opentofu user sudo
      become: true
      community.general.sudoers:
        name: opentofu
        commands: ALL
        runas: ALL
        state: present
        user: opentofu
        nopassword: true

    - name: Read Proxmox root password from 1Password
      no_log: true
      ansible.builtin.include_role:
        name: onepassword
      vars:
        onepassword_action: read
        onepassword_item:
          title: "Proxmox Root User"

    - name: Check if OpenTofu SSH key exists in 1Password
      no_log: true
      ansible.builtin.command:
        cmd: op item get "OpenTofu SSH Key" --vault "{{ onepassword_vault }}"
      become: true
      become_user: "{{ onepassword_become_user }}"
      delegate_to: localhost
      register: opentofu_ssh_key_check
      failed_when: false
      changed_when: false

    - name: Create OpenTofu SSH key in 1Password
      no_log: true
      ansible.builtin.shell: # noqa: command-instead-of-shell
        cmd: >-
          op item create
          --category ssh
          --title "OpenTofu SSH Key"
          --vault "{{ onepassword_vault }}"
          </dev/null
        executable: /bin/bash
      become: true
      become_user: "{{ onepassword_become_user }}"
      delegate_to: localhost
      when: opentofu_ssh_key_check.rc != 0
      changed_when: true

    - name: Get OpenTofu SSH private key from 1Password
      no_log: true
      ansible.builtin.command:
        cmd: >-
          op read "op://{{ onepassword_vault }}/OpenTofu SSH Key/private key?ssh-format=openssh"
      become: true
      become_user: "{{ onepassword_become_user }}"
      delegate_to: localhost
      register: opentofu_ssh_private_key
      changed_when: false

    - name: Derive OpenTofu SSH public key
      no_log: true
      ansible.builtin.shell: # noqa: command-instead-of-shell
        cmd: >-
          TMPKEY=$(mktemp) &&
          trap "rm -f $TMPKEY" EXIT &&
          chmod 600 $TMPKEY &&
          echo "{{ opentofu_ssh_private_key.stdout }}" > $TMPKEY &&
          ssh-keygen -y -f $TMPKEY
        executable: /bin/bash
      delegate_to: localhost
      register: opentofu_ssh_public_key
      changed_when: false

    - name: Authorize opentofu SSH key for opentofu user
      become: true
      no_log: true
      ansible.posix.authorized_key:
        user: opentofu
        key: "{{ opentofu_ssh_public_key.stdout }}"

    - name: Create Proxmox role
      # No role management behavior in community.proxmox
      become: true
      vars:
        role_privs:
          - Datastore.Allocate
          - Datastore.AllocateSpace
          - Datastore.AllocateTemplate
          - Datastore.Audit
          - Sys.Audit
          - Sys.Console
          - Sys.Modify
          - VM.Allocate
          - VM.Audit
          - VM.Clone
          - VM.Config.CDROM
          - VM.Config.Cloudinit
          - VM.Config.CPU
          - VM.Config.Disk
          - VM.Config.HWType
          - VM.Config.Memory
          - VM.Config.Network
          - VM.Config.Options
          - VM.GuestAgent.Audit
          - VM.PowerMgmt
          - SDN.Use
      block:
        - name: Role Check
          become: true
          ansible.builtin.command: >-
            pvesh get /access/roles/opentofu --output-format json
          register: proxmox_role_check
          failed_when: false
          changed_when: false

        - name: Role Creation
          become: true
          no_log: true
          ansible.builtin.command: |-
            pvesh create /access/roles -roleid opentofu -privs '{{ role_privs | join(",") }}'
          when: proxmox_role_check.rc != 0
          changed_when: true

    - name: Group
      community.proxmox.proxmox_group: # noqa: args[module]
        groupid: opentofu
        api_host: "{{ proxmox_api_node }}"
        api_user: root@pam
        api_password: >-
          {{
            onepassword_item_result.fields |
            selectattr('id', 'equalto', 'password') |
            map(attribute='value') | first
          }}
        validate_certs: false
        state: present
        comment: Managed by Ansible

    - name: Grant Proxmox group opentofu role
      community.proxmox.proxmox_access_acl: # noqa: args[module]
        path: /
        roleid: opentofu
        ugid: opentofu
        api_host: "{{ proxmox_api_node }}"
        api_user: root@pam
        api_password: >-
          {{
            onepassword_item_result.fields |
            selectattr('id', 'equalto', 'password') |
            map(attribute='value') | first
          }}
        validate_certs: false
        state: present
        type: group

    - name: Create Proxmox OpenTofu user
      community.proxmox.proxmox_user: # noqa: args[module]
        comment: "Managed by Ansible"
        userid: opentofu@pam
        api_host: "{{ proxmox_api_node }}"
        api_user: root@pam
        api_password: >-
          {{
            onepassword_item_result.fields |
            selectattr('id', 'equalto', 'password') |
            map(attribute='value') | first
          }}
        validate_certs: false
        state: present
        groups:
          - opentofu

    - name: API Token
      block:
        - name: Check if OpenTofu token exists in 1Password
          become: true
          become_user: "{{ onepassword_become_user }}"
          delegate_to: localhost
          no_log: true
          ansible.builtin.command:
            cmd: >-
              op item get "Proxmox OpenTofu API Token"
              --vault "{{ onepassword_vault }}"
          register: opentofu_token_1password_check
          failed_when: false
          changed_when: false

        - name: Check if OpenTofu token exists in Proxmox
          become: true
          ansible.builtin.command:
            cmd: pvesh get /access/users/opentofu@pam/token/opentofu_token
          register: opentofu_token_proxmox_check
          failed_when: false
          changed_when: false

        - name: Set token exists fact
          ansible.builtin.set_fact:
            opentofu_token_exists: >-
              {{
                (opentofu_token_1password_check.rc == 0 and
                opentofu_token_proxmox_check.rc == 0) | bool
              }}

        - name: Create or Recreate OpenTofu API token
          when: not opentofu_token_exists
          block:
            - name: Delete existing Proxmox token if not in 1Password
              become: true
              ansible.builtin.command:
                cmd: pvesh delete /access/users/opentofu@pam/token/opentofu_token
              failed_when: false
              changed_when: true

            - name: Create OpenTofu API token
              become: true
              no_log: true
              ansible.builtin.command:
                cmd: >-
                  pvesh create /access/users/opentofu@pam/tokens/opentofu_token --privsep 0
                  --comment='Managed by Ansible' --output-format=json
              register: opentofu_user_token
              changed_when: true

            - name: Store OpenTofu token in 1Password
              no_log: true
              ansible.builtin.include_role:
                name: onepassword
              vars:
                onepassword_action: upsert
                onepassword_item:
                  title: "Proxmox OpenTofu API Token"
                  username: "{{ (opentofu_user_token.stdout | from_json)['full-tokenid'] }}"
                  password: "{{ (opentofu_user_token.stdout | from_json).value }}"
                  # custom_fields:
                  #   - label: Notes
                  #     value: "Managed by Ansible bootstrap. Do not rename this item."
                  #     field_type: STRING

- name: Bootstrap - Proxmox Storage
  hosts: enterprise
  tasks:
    - name: Get current local storage content types
      become: true
      ansible.builtin.shell:
        cmd: "awk '/^dir: local/,/content/ {if (/content/) print}' /etc/pve/storage.cfg || echo ''"
      register: current_content_types
      changed_when: false

    - name: Enable snippets content type on local storage
      become: true
      ansible.builtin.command:
        cmd: pvesm set local --content vztmpl,backup,iso,snippets
      when:
        - "'snippets' not in current_content_types.stdout"
        - "current_content_types.stdout != 'content iso,backup,vztmpl,snippets'"
      changed_when: "'snippets' not in current_content_types.stdout"
