---
# One-time bootstrap playbook.
# Runs as root since the ansible user does not exist yet.
#
# Prerequisites:
#   - "Proxmox Root User" must exist in 1Password with the root@pam password
#     set during Proxmox installation. Bootstrap cannot create this — it must
#     be added manually before running.
#
# SECURITY NOTE: This playbook intentionally disables certificate validation
# (validate_certs: false) because the Proxmox instance uses a self-signed
# certificate during initial setup. This is required for bootstrap only.
# DO NOT copy this pattern to regular playbooks.

- name: Bootstrap - Pre-flight Validation
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Verify proxmox_admin_password_salt is set
      ansible.builtin.assert:
        that:
          - hostvars['enterprise']['proxmox_admin_password_salt'] is defined
          - hostvars['enterprise']['proxmox_admin_password_salt'] | string | length > 0
        fail_msg: "proxmox_admin_password_salt is not defined. Set it in host_vars/enterprise/secrets.yml."

    - name: Update known_hosts for enterprise
      ansible.builtin.include_role:
        name: identity
        tasks_from: known_hosts
      vars:
        identity_target: "enterprise"

    - name: Verify enterprise is reachable
      ansible.builtin.wait_for:
        host: "{{ hostvars['enterprise'].ansible_host }}"
        port: 22
        timeout: 10
      delegate_to: localhost

- name: Bootstrap - Ansible User
  hosts: enterprise
  gather_facts: false
  remote_user: root
  vars:
    ansible_user: root
  roles:
    - ansible

- name: Bootstrap - DNS
  hosts: enterprise
  gather_facts: false
  remote_user: root
  vars:
    ansible_user: root
  tasks:
    - name: Check if DNS is working
      ansible.builtin.command:
        cmd: getent hosts cloud-images.ubuntu.com
      register: dns_check
      failed_when: false
      changed_when: false

    - name: Set temporary upstream DNS if resolution is failing
      become: true
      ansible.builtin.copy:
        content: "nameserver 1.1.1.1\n"
        dest: /etc/resolv.conf
        mode: "0644"
      when: dns_check.rc != 0

- name: Bootstrap - Proxmox Admin User
  hosts: enterprise
  remote_user: root
  tasks:
    - name: Create system admin user
      ansible.builtin.include_role:
        name: system_user
        tasks_from: admin_user

    - name: Read Proxmox root password from 1Password
      no_log: true
      ansible.builtin.include_role:
        name: onepassword
      vars:
        onepassword_action: read
        onepassword_item:
          title: "Proxmox Root User"

    - name: Create Proxmox admin user
      ansible.builtin.include_role:
        name: proxmox_user
        tasks_from: admin_user

- name: Bootstrap - Proxmox OpenTofu User
  hosts: enterprise
  remote_user: root
  tasks:
    - name: Create system opentofu user
      ansible.builtin.include_role:
        name: system_user
        tasks_from: service_user
      vars:
        system_user_name: opentofu

    - name: Manage opentofu SSH key
      ansible.builtin.include_role:
        name: identity
        tasks_from: upsert_key
      vars:
        upsert_key_user: opentofu
        upsert_key_item_title: "OpenTofu SSH Key"

    - name: Create Proxmox user and group structure
      ansible.builtin.include_role:
        name: proxmox_user
        tasks_from: service_user
      vars:
        proxmox_service_user_name: opentofu

    - name: Manage OpenTofu API token
      ansible.builtin.include_role:
        name: proxmox_user
        tasks_from: api_token
      vars:
        proxmox_api_token_user: opentofu
        proxmox_api_token_item_title: "Proxmox OpenTofu API Token"

- name: Bootstrap - Proxmox Ansible User
  hosts: enterprise
  remote_user: root
  tasks:
    - name: Create Proxmox ansible user and group structure
      ansible.builtin.include_role:
        name: proxmox_user
        tasks_from: service_user
      vars:
        proxmox_service_user_name: ansible

    - name: Manage Ansible API token
      ansible.builtin.include_role:
        name: proxmox_user
        tasks_from: api_token
      vars:
        proxmox_api_token_user: ansible
        proxmox_api_token_item_title: "Proxmox Ansible API Token"

- name: Bootstrap - Proxmox Storage
  hosts: enterprise
  tasks:
    - name: Get current local storage content types
      become: true
      ansible.builtin.shell:
        cmd: "awk '/^dir: local/,/content/ {if (/content/) print}' /etc/pve/storage.cfg || echo ''"
      register: current_content_types
      changed_when: false

    - name: Enable snippets content type on local storage
      become: true
      ansible.builtin.command:
        cmd: pvesm set local --content vztmpl,backup,iso,snippets
      when:
        - "'snippets' not in current_content_types.stdout"
        - "current_content_types.stdout != 'content iso,backup,vztmpl,snippets'"
      changed_when: "'snippets' not in current_content_types.stdout"
