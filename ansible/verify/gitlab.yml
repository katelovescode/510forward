---
# GitLab verification
#
# Verifies the full chain: DNS resolves memory-alpha to norville, NPM proxies
# to memory-alpha:80, GitLab responds. GitLab issues its own HTTP→HTTPS redirect
# so we accept 200 and redirects.

- name: GitLab | GitLab is reachable via NPM
  hosts: localhost
  gather_facts: false
  connection: local
  tasks:
    - name: Reach GitLab via NPM
      ansible.builtin.uri:
        url: "https://memory-alpha.{{ domain }}"
        status_code: [200, 301, 302]
      tags: [verify, gitlab]
