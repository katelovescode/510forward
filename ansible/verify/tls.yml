---
# TLS verification
#
# Checks two separate certs:
#
# - Proxmox (enterprise): Let's Encrypt cert for enterprise.510forward.space,
#   issued via Proxmox ACME + Cloudflare DNS-01, renewed automatically by Proxmox.
#   enterprise.510forward.space resolves to norville (NPM) so we connect directly
#   to the Proxmox IP:8006 with -servername to check the cert on the backend.
#
# - NPM wildcard (norville): *.510forward.space cert issued via Cloudflare DNS-01,
#   renewed automatically by NPM. Served on port 443 for all proxied subdomains.

- name: TLS | Proxmox has a valid Let's Encrypt cert
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    proxmox_ip: "{{ hostvars['enterprise']['ip_address'] }}"
    proxmox_host: "enterprise.{{ domain }}"
  tasks:
    - name: Get Proxmox cert issuer and subject via openssl
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          openssl s_client -connect {{ proxmox_ip }}:8006 \
            -servername {{ proxmox_host }} </dev/null 2>/dev/null \
            | openssl x509 -noout -issuer -subject
        executable: /bin/bash
      register: proxmox_cert_info
      changed_when: false
      tags: [verify, tls]

    - name: Assert Proxmox cert is issued by Let's Encrypt
      ansible.builtin.assert:
        that: "'Let' in proxmox_cert_info.stdout"
        fail_msg: "Proxmox cert issuer is not Let's Encrypt: {{ proxmox_cert_info.stdout }}"
        success_msg: "Proxmox cert issuer OK: {{ proxmox_cert_info.stdout }}"
      tags: [verify, tls]

    - name: Assert Proxmox cert subject matches expected hostname
      ansible.builtin.assert:
        that: proxmox_host in proxmox_cert_info.stdout
        fail_msg: "Proxmox cert subject does not include {{ proxmox_host }}: {{ proxmox_cert_info.stdout }}"
        success_msg: "Proxmox cert subject OK: {{ proxmox_cert_info.stdout }}"
      tags: [verify, tls]

- name: TLS | NPM is serving the wildcard cert
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    npm_host: "norville.{{ domain }}"
  tasks:
    - name: Connect to NPM over HTTPS (validates cert trust chain)
      ansible.builtin.uri:
        url: "https://{{ npm_host }}"
        status_code: [200, 301, 302]
      tags: [verify, tls]

    - name: Get NPM cert issuer and subject via openssl
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          openssl s_client -connect {{ npm_host }}:443 \
            -servername {{ npm_host }} </dev/null 2>/dev/null \
            | openssl x509 -noout -issuer -subject
        executable: /bin/bash
      register: npm_cert_info
      changed_when: false
      tags: [verify, tls]

    - name: Assert NPM cert is issued by Let's Encrypt
      ansible.builtin.assert:
        that: "'Let' in npm_cert_info.stdout"
        fail_msg: "NPM cert issuer is not Let's Encrypt: {{ npm_cert_info.stdout }}"
        success_msg: "NPM cert issuer OK: {{ npm_cert_info.stdout }}"
      tags: [verify, tls]

    - name: Assert NPM cert is the wildcard
      ansible.builtin.assert:
        that: ('*.' + domain) in npm_cert_info.stdout
        fail_msg: "NPM cert subject is not the wildcard: {{ npm_cert_info.stdout }}"
        success_msg: "NPM cert subject OK: {{ npm_cert_info.stdout }}"
      tags: [verify, tls]

- name: TLS | HTTP redirects to HTTPS
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    npm_host: "norville.{{ domain }}"
  tasks:
    - name: Request norville over HTTP
      ansible.builtin.uri:
        url: "http://{{ npm_host }}"
        follow_redirects: none
        status_code: [301, 302]
      register: http_response
      tags: [verify, tls]

    - name: Assert redirect destination is HTTPS
      ansible.builtin.assert:
        that: "http_response.location is defined and http_response.location.startswith('https://')"
        fail_msg: "HTTP did not redirect to HTTPS (Location: {{ http_response.location | default('none') }})"
        success_msg: "HTTP → HTTPS redirect OK (Location: {{ http_response.location }})"
      tags: [verify, tls]
