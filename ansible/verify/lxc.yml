---
# LXC container verification
#
# Verifies that LXC containers are reachable and their primary services are
# running. Unlike QEMU VMs there is no guest agent to check — connectivity
# via Ansible ping is the baseline, with service checks per container.

- name: LXC | Containers are reachable
  hosts: lxc_containers
  gather_facts: false
  tasks:
    - name: Ping LXC container
      ansible.builtin.ping:
      tags: [verify, lxc]

- name: LXC | pihole-FTL is running on centaurus
  hosts: centaurus
  gather_facts: false
  tasks:
    - name: Gather service facts
      ansible.builtin.service_facts:
      tags: [verify, lxc]

    - name: Assert pihole-FTL is running
      ansible.builtin.assert:
        that: ansible_facts.services['pihole-FTL.service'].state == 'running'
        fail_msg: "pihole-FTL is not running on centaurus"
        success_msg: "pihole-FTL is active on centaurus"
      tags: [verify, lxc]

- name: LXC | homepage is running on dorothy
  hosts: dorothy
  gather_facts: false
  tasks:
    - name: Gather service facts
      ansible.builtin.service_facts:
      tags: [verify, lxc]

    - name: Assert homepage is running
      ansible.builtin.assert:
        that: ansible_facts.services['homepage.service'].state == 'running'
        fail_msg: "homepage is not running on dorothy"
        success_msg: "homepage is active on dorothy"
      tags: [verify, lxc]
