---
# DNS verification
#
# Checks that Pi-hole is up and serving correct answers on both nodes, and that
# enterprise's resolv.conf is pointed at Pi-hole and getting the right results.
#
# UNTESTED: whether Pi-hole nodes bypass Pi-hole for their own OS-level DNS.
# They use 1.1.1.1 directly via a systemd-resolved drop-in to avoid a circular
# dependency at boot. Verifying this requires stopping pihole-FTL — run the
# manual failover test in the plan checklist instead.

- name: DNS | Enterprise resolves internal hostnames via Pi-hole
  hosts: proxmox_nodes
  gather_facts: false
  vars:
    expected_resolutions:
      - hostname: "centaurus.{{ domain }}"
        ip: "{{ hostvars['centaurus']['ip_address'] }}"
      - hostname: "norville.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
      - hostname: "dorothy.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
      - hostname: "codsworth.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
      - hostname: "memory-alpha.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
  tasks:
    - name: Resolve internal hostname from enterprise
      ansible.builtin.command: "dig +short {{ item.hostname }}"
      register: dig_results
      changed_when: false
      loop: "{{ expected_resolutions }}"
      loop_control:
        label: "{{ item.hostname }}"
      tags: [verify, dns]

    - name: Assert internal hostnames resolve to expected IPs
      ansible.builtin.assert:
        that: item.item.ip in item.stdout
        fail_msg: "{{ item.item.hostname }} did not resolve to {{ item.item.ip }} from enterprise (got: '{{ item.stdout | default('(empty)') }}')"
        success_msg: "{{ item.item.hostname }} → {{ item.item.ip }}"
      loop: "{{ dig_results.results }}"
      loop_control:
        label: "{{ item.item.hostname }}"
      tags: [verify, dns]

- name: DNS | Pi-hole primary (centaurus) resolves internal hostnames correctly
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    pihole_primary_ip: "{{ hostvars['centaurus']['ip_address'] }}"
    expected_resolutions:
      - hostname: "enterprise.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
      - hostname: "centaurus.{{ domain }}"
        ip: "{{ hostvars['centaurus']['ip_address'] }}"
      - hostname: "norville.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
      - hostname: "dorothy.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
      - hostname: "codsworth.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
      - hostname: "memory-alpha.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
  tasks:
    - name: Query Pi-hole primary for internal hostname
      ansible.builtin.command: "dig +short {{ item.hostname }} @{{ pihole_primary_ip }}"
      register: dig_results
      changed_when: false
      loop: "{{ expected_resolutions }}"
      loop_control:
        label: "{{ item.hostname }}"
      tags: [verify, dns]

    - name: Assert internal hostnames resolve to expected IPs
      ansible.builtin.assert:
        that: "item.item.ip in item.stdout"
        fail_msg: "{{ item.item.hostname }} did not resolve to {{ item.item.ip }} via Pi-hole primary (got: '{{ item.stdout | default('(empty)') }}')"
        success_msg: "{{ item.item.hostname }} → {{ item.item.ip }}"
      loop: "{{ dig_results.results }}"
      loop_control:
        label: "{{ item.item.hostname }}"
      tags: [verify, dns]

- name: DNS | Pi-hole secondary (andromeda) resolves internal hostnames correctly
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    pihole_secondary_ip: "{{ hostvars['andromeda']['ip_address'] }}"
    expected_resolutions:
      - hostname: "enterprise.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
      - hostname: "norville.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
      - hostname: "dorothy.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
      - hostname: "codsworth.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
      - hostname: "memory-alpha.{{ domain }}"
        ip: "{{ hostvars['norville']['ip_address'] }}"
  tasks:
    - name: Query Pi-hole secondary for internal hostname
      ansible.builtin.command: "dig +short {{ item.hostname }} @{{ pihole_secondary_ip }}"
      register: dig_results
      changed_when: false
      loop: "{{ expected_resolutions }}"
      loop_control:
        label: "{{ item.hostname }}"
      tags: [verify, dns]

    - name: Assert andromeda resolves internal hostnames to expected IPs
      ansible.builtin.assert:
        that: "item.item.ip in item.stdout"
        fail_msg: "{{ item.item.hostname }} did not resolve to {{ item.item.ip }} via andromeda (got: '{{ item.stdout | default('(empty)') }}')"
        success_msg: "{{ item.item.hostname }} → {{ item.item.ip }}"
      loop: "{{ dig_results.results }}"
      loop_control:
        label: "{{ item.item.hostname }}"
      tags: [verify, dns]

- name: DNS | pihole-FTL is running on all Pi-hole nodes
  hosts: pihole_nodes
  gather_facts: false
  tasks:
    - name: Gather service facts
      ansible.builtin.service_facts:
      tags: [verify, dns]

    - name: Assert pihole-FTL is running
      ansible.builtin.assert:
        that: ansible_facts.services['pihole-FTL.service'].state == 'running'
        fail_msg: "pihole-FTL is not running on {{ inventory_hostname }}"
        success_msg: "pihole-FTL is active on {{ inventory_hostname }}"
      tags: [verify, dns]
