---
# Home Assistant verification
#
# Checks HA is up via its REST API and that the Proxmox integration token is
# valid. The /api/ endpoint returns 200 with no auth required — reliable liveness
# check. Token auth goes directly to the Proxmox IP (not hostname) since
# enterprise.510forward.space resolves to norville and nothing listens on 8006 there.

- name: HA | Home Assistant API is responding
  hosts: localhost
  gather_facts: false
  connection: local
  tasks:
    - name: Reach Home Assistant API via NPM
      ansible.builtin.uri:
        url: "https://codsworth.{{ domain }}/"
        status_code: 200
      tags: [verify, home_assistant]

- name: HA | Proxmox API token authenticates successfully
  hosts: localhost
  gather_facts: false
  connection: local
  tasks:
    - name: Read Proxmox Home Assistant API token
      ansible.builtin.include_role:
        name: onepassword
      vars:
        onepassword_action: read
        onepassword_item:
          title: "Proxmox Home Assistant API Token"
      no_log: true
      tags: [verify, home_assistant]

    - name: Assert Proxmox token authenticates to API
      ansible.builtin.uri:
        url: "https://{{ hostvars['enterprise']['ip_address'] }}:8006/api2/json/nodes"
        headers:
          Authorization: >-
            PVEAPIToken={{
              onepassword_item_result.fields |
              selectattr('id', 'equalto', 'token_id') |
              map(attribute='value') | first
            }}={{
              onepassword_item_result.fields |
              selectattr('id', 'equalto', 'credential') |
              map(attribute='value') | first
            }}
        validate_certs: false
        status_code: 200
      no_log: true
      tags: [verify, home_assistant]
