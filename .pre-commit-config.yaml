repos:
  - repo: local
    hooks:
      - id: check-1password-titles
        name: Check 1Password item titles exist in 1Password vault
        entry: python ansible/scripts/check_1password_titles.py
        language: python
        pass_filenames: false
        always_run: true
      - id: check-docs-and-specs
        name: Check runbook and argument_specs coverage
        entry: python ansible/scripts/check_docs_and_specs.py
        language: python
        pass_filenames: false
        always_run: true
